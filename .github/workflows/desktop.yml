name: Build desktop installers

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot rpm

      - run: npm ci
      - run: npm run make:desktop

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: vibe-learn-${{ runner.os }}-${{ runner.arch }}
          path: out/make/**/*
          if-no-files-found: error
          retention-days: 14
