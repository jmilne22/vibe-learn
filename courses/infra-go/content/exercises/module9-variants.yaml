decisionSets:
  - id: transport-reliable-stream
    family: network-transport-choice
    prompt: Messages may exceed one packet, ordering matters, and the client keeps a long-lived connection. Which transport is the natural starting point?
    options:
      - { id: tcp, label: TCP, description: Reliable ordered byte stream with connection state. }
      - { id: udp, label: UDP, description: Independent best-effort datagrams. }
      - { id: dns, label: DNS, description: Application protocol for name resolution. }
    answer: tcp
    explanation: TCP supplies ordered reliable delivery and stream semantics. The application still needs message framing because TCP does not preserve message boundaries.
  - id: transport-small-datagrams
    family: network-transport-choice
    prompt: A telemetry sender emits tiny independent samples and prefers dropping an occasional sample over head-of-line blocking. Which transport fits?
    options:
      - { id: udp, label: UDP, description: Independent datagrams with minimal transport overhead. }
      - { id: tcp, label: TCP, description: Reliable ordered stream that retransmits loss. }
      - { id: http, label: HTTP, description: An application protocol usually carried over a transport. }
    answer: udp
    explanation: UDP preserves datagram boundaries and avoids retransmission delays. The application must tolerate loss, duplication, and reordering.
  - id: transport-dns-fallback
    family: network-transport-choice
    prompt: A DNS response is too large and arrives with the truncated flag set. What should a conventional resolver do next?
    options:
      - { id: tcp, label: Retry over TCP, description: Obtain the full ordered response after UDP truncation. }
      - { id: udp, label: Repeat UDP forever, description: Keep requesting the same truncated datagram. }
      - { id: drop, label: Treat it as NXDOMAIN, description: Convert truncation into a missing-name response. }
    answer: tcp
    explanation: Classic DNS begins with UDP for common queries and retries over TCP when the TC flag indicates the response was truncated.
variants:
  warmups:
    - id: warmup_1
      concept: TCP
      decisionFamily: network-transport-choice
      strategy: tcp
      confusableWith: [udp]
      variants:
        - id: v1
          title: TCP Echo Handler
          description: >-
            Write a TCP connection handler that reads lines with <code>bufio.Scanner</code> and echoes each line back.
            Close the connection when the client sends <code>"QUIT"</code>.
          hints:
            - Use <code>bufio.NewScanner(conn)</code> to read lines, <code>fmt.Fprintln(conn, line)</code> to write back
            - Remember <code>defer conn.Close()</code>
          driverGo: |-
            client, server := net.Pipe()
            go handleConn(server)
            in := bufio.NewReader(client)
            fmt.Fprintln(client, "deploy checkout-api")
            echo, _ := in.ReadString('\n')
            fmt.Print(echo)
            fmt.Fprintln(client, "QUIT")
            bye, _ := in.ReadString('\n')
            fmt.Print(bye)
          solution: |-
            func handleConn(conn net.Conn) {
                defer conn.Close()
                scanner := bufio.NewScanner(conn)
                for scanner.Scan() {
                    line := scanner.Text()
                    if line == "QUIT" {
                        fmt.Fprintln(conn, "BYE")
                        return
                    }
                    fmt.Fprintln(conn, line)
                }
            }
        - id: v2
          title: TCP Client with Timeout
          description: >-
            Write a function that connects to a TCP server with a 5-second timeout using <code>net.DialTimeout</code>.
            Send a message and read the response.
          hints:
            - Use <code>net.DialTimeout("tcp", addr, 5*time.Second)</code>
            - Read with <code>bufio.NewReader(conn).ReadString('\n')</code>
          driverGo: |-
            ln, err := net.Listen("tcp", "127.0.0.1:0")
            if err != nil {
                fmt.Println("listen:", err)
                return
            }
            go func() {
                conn, err := ln.Accept()
                if err != nil {
                    return
                }
                defer conn.Close()
                line, _ := bufio.NewReader(conn).ReadString('\n')
                fmt.Fprintln(conn, "ACK "+strings.TrimSpace(line))
            }()
            reply, err := sendMessage(ln.Addr().String(), "deploy checkout-api")
            fmt.Println(reply, err)
          solution: |-
            func sendMessage(addr, msg string) (string, error) {
                conn, err := net.DialTimeout("tcp", addr, 5*time.Second)
                if err != nil {
                    return "", err
                }
                defer conn.Close()
                fmt.Fprintln(conn, msg)
                reply, err := bufio.NewReader(conn).ReadString('\n')
                return strings.TrimSpace(reply), err
            }
    - id: warmup_2
      concept: UDP
      decisionFamily: network-transport-choice
      strategy: udp
      confusableWith: [tcp]
      variants:
        - id: v1
          title: UDP Echo Server
          description: >-
            Write a UDP server that reads packets and sends back <code>"ACK: "</code> + the received message to the
            sender. Split it into <code>udpEcho(addr string) error</code>, which listens, and
            <code>serveEcho(pc net.PacketConn) error</code>, which loops reading and acknowledging packets.
          hints:
            - Use <code>net.ListenPacket("udp", addr)</code> to listen
            - Read with <code>pc.ReadFrom(buf)</code>, respond with <code>pc.WriteTo(response, addr)</code>
          driverGo: |-
            pc, err := net.ListenPacket("udp", "127.0.0.1:0")
            if err != nil {
                fmt.Println("listen:", err)
                return
            }
            go serveEcho(pc)
            client, err := net.Dial("udp", pc.LocalAddr().String())
            if err != nil {
                fmt.Println("dial:", err)
                return
            }
            fmt.Fprint(client, "deploy web-1")
            buf := make([]byte, 1024)
            n, _ := client.Read(buf)
            fmt.Println(string(buf[:n]))
          solution: |-
            func udpEcho(addr string) error {
                pc, err := net.ListenPacket("udp", addr)
                if err != nil {
                    return err
                }
                defer pc.Close()
                return serveEcho(pc)
            }

            func serveEcho(pc net.PacketConn) error {
                buf := make([]byte, 1024)
                for {
                    n, sender, err := pc.ReadFrom(buf)
                    if err != nil {
                        return err
                    }
                    msg := string(buf[:n])
                    pc.WriteTo([]byte("ACK: "+msg), sender)
                }
            }
    - id: warmup_3
      concept: DNS Wire Format
      variants:
        - id: v1
          title: Encode Domain Name
          description: >-
            Write a function that encodes a domain name (like <code>"example.com"</code>) into DNS wire format:
            length-prefixed labels ending with a null byte. Example: <code>"example.com"</code> →
            <code>[7]example[3]com[0]</code>.
          hints:
            - >-
              Split on <code>"."</code>, then for each label: append <code>byte(len(label))</code> then
              <code>[]byte(label)</code>. End with <code>0</code>.
          driverGo: |-
            fmt.Println(encodeDomain("example.com"))
            fmt.Println(encodeDomain("api.internal.cluster"))
            fmt.Println(encodeDomain("localhost"))
          solution: |-
            func encodeDomain(domain string) []byte {
                var buf []byte
                for _, label := range strings.Split(domain, ".") {
                    buf = append(buf, byte(len(label)))
                    buf = append(buf, []byte(label)...)
                }
                buf = append(buf, 0)
                return buf
            }
        - id: v2
          title: Parse DNS Header
          description: >-
            Write a function that parses a 12-byte DNS header from raw bytes using
            <code>encoding/binary.BigEndian</code>. Return a struct with ID, Flags, QDCount, ANCount, NSCount, ARCount
            (all uint16).
          hints:
            - Use <code>binary.BigEndian.Uint16(data[0:2])</code> for each 2-byte field
            - Fields are at offsets 0, 2, 4, 6, 8, 10
          driverGo: |-
            query := []byte{0x12, 0x34, 0x01, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00}
            fmt.Printf("%+v\n", parseHeader(query))
            response := []byte{0x12, 0x34, 0x81, 0x80, 0x00, 0x01, 0x00, 0x02, 0x00, 0x00, 0x00, 0x01}
            fmt.Printf("%+v\n", parseHeader(response))
          solution: |-
            type DNSHeader struct {
                ID, Flags, QDCount, ANCount, NSCount, ARCount uint16
            }

            func parseHeader(data []byte) DNSHeader {
                return DNSHeader{
                    ID:      binary.BigEndian.Uint16(data[0:2]),
                    Flags:   binary.BigEndian.Uint16(data[2:4]),
                    QDCount: binary.BigEndian.Uint16(data[4:6]),
                    ANCount: binary.BigEndian.Uint16(data[6:8]),
                    NSCount: binary.BigEndian.Uint16(data[8:10]),
                    ARCount: binary.BigEndian.Uint16(data[10:12]),
                }
            }
  challenges:
    - id: challenge_1
      block: 1
      difficulty: 1
      concept: TCP
      variants:
        - id: v1
          title: Key-Value TCP Server
          description: >-
            Build a TCP server that handles <code>GET key</code> and <code>SET key value</code> commands. Store data in
            a <code>map[string]string</code>. Return the value for GET, or <code>"OK"</code> for SET. Return <code>"NOT
            FOUND"</code> for missing keys.
          functionSignature: func handleKVConn(conn net.Conn, store map[string]string, mu *sync.RWMutex)
          difficulty: 1
          testCases:
            - input: SET name redis
              output: OK
            - input: GET name
              output: redis
            - input: GET missing
              output: NOT FOUND
          hints:
            - title: Think about it
              content: How do you parse the command and arguments from a line? How do you protect the shared map?
            - title: Hint
              content: >-
                Split the line with strings.Fields. Lock mu for writes (SET), RLock for reads (GET). Use bufio.Scanner
                to read lines.
          testGo: |-
            func startKVConn(t *testing.T) (net.Conn, *bufio.Reader) {
                t.Helper()
                client, server := net.Pipe()
                store := make(map[string]string)
                var mu sync.RWMutex
                go handleKVConn(server, store, &mu)
                t.Cleanup(func() { client.Close() })
                client.SetDeadline(time.Now().Add(3 * time.Second))
                return client, bufio.NewReader(client)
            }

            func sendLine(t *testing.T, conn net.Conn, r *bufio.Reader, cmd string) string {
                t.Helper()
                if _, err := fmt.Fprintln(conn, cmd); err != nil {
                    t.Fatalf("write %q: %v", cmd, err)
                }
                line, err := r.ReadString('\n')
                if err != nil {
                    t.Fatalf("read reply to %q: %v", cmd, err)
                }
                return strings.TrimSpace(line)
            }

            func TestKVSetGet(t *testing.T) {
                conn, r := startKVConn(t)
                if got := sendLine(t, conn, r, "SET name redis"); got != "OK" {
                    t.Errorf("SET reply = %q, want OK", got)
                }
                if got := sendLine(t, conn, r, "GET name"); got != "redis" {
                    t.Errorf("GET reply = %q, want redis", got)
                }
            }

            func TestKVMissingKey(t *testing.T) {
                conn, r := startKVConn(t)
                if got := sendLine(t, conn, r, "GET nope"); got != "NOT FOUND" {
                    t.Errorf("GET missing reply = %q, want NOT FOUND", got)
                }
            }

            func TestKVMultiWordValue(t *testing.T) {
                conn, r := startKVConn(t)
                sendLine(t, conn, r, "SET greeting hello world")
                if got := sendLine(t, conn, r, "GET greeting"); got != "hello world" {
                    t.Errorf("GET reply = %q, want %q", got, "hello world")
                }
            }
          solution: |-
            func handleKVConn(conn net.Conn, store map[string]string, mu *sync.RWMutex) {
                defer conn.Close()
                scanner := bufio.NewScanner(conn)
                for scanner.Scan() {
                    parts := strings.Fields(scanner.Text())
                    if len(parts) == 0 {
                        continue
                    }
                    switch strings.ToUpper(parts[0]) {
                    case "SET":
                        if len(parts) < 3 {
                            fmt.Fprintln(conn, "ERR usage: SET key value")
                            continue
                        }
                        mu.Lock()
                        store[parts[1]] = strings.Join(parts[2:], " ")
                        mu.Unlock()
                        fmt.Fprintln(conn, "OK")
                    case "GET":
                        if len(parts) < 2 {
                            fmt.Fprintln(conn, "ERR usage: GET key")
                            continue
                        }
                        mu.RLock()
                        val, ok := store[parts[1]]
                        mu.RUnlock()
                        if ok {
                            fmt.Fprintln(conn, val)
                        } else {
                            fmt.Fprintln(conn, "NOT FOUND")
                        }
                    default:
                        fmt.Fprintln(conn, "ERR unknown command")
                    }
                }
            }
          annotations:
            - type: pattern
              label: Command + Mutex Server
              text: Command parsing + shared state with RWMutex — the foundation of any TCP protocol server
            - type: idiom
              label: RWMutex Read-Heavy
              text: "RWMutex for read-heavy workloads: multiple concurrent readers, exclusive writers"
        - id: v2
          title: Concurrent TCP Chat Server
          description: >-
            Build a chat server where clients connect via TCP. Each message from a client is broadcast to all other
            connected clients. Track clients with a map of connections protected by a mutex.
          functionSignature: func runChatServer(addr string) error
          difficulty: 2
          testCases:
            - input: client A sends "hello"
              output: "client B receives \"[A]: hello\""
            - input: client disconnects
              output: removed from broadcast list
          hints:
            - title: Think about it
              content: How do you safely add/remove clients while broadcasting? How do you detect disconnected clients?
            - title: Hint
              content: >-
                Keep a map[net.Conn]string (conn → name). Mutex-protect add/remove. Broadcast by iterating the map and
                writing to each conn. If write fails, remove that client.
          testGo: |-
            func freePort(t *testing.T) string {
                t.Helper()
                ln, err := net.Listen("tcp", "127.0.0.1:0")
                if err != nil {
                    t.Fatal(err)
                }
                addr := ln.Addr().String()
                ln.Close()
                return addr
            }

            func dialWithRetry(t *testing.T, addr string) net.Conn {
                t.Helper()
                deadline := time.Now().Add(2 * time.Second)
                for time.Now().Before(deadline) {
                    conn, err := net.Dial("tcp", addr)
                    if err == nil {
                        return conn
                    }
                    time.Sleep(20 * time.Millisecond)
                }
                t.Fatalf("could not connect to chat server at %s", addr)
                return nil
            }

            func TestChatBroadcast(t *testing.T) {
                addr := freePort(t)
                go runChatServer(addr)

                clientA := dialWithRetry(t, addr)
                defer clientA.Close()
                clientB := dialWithRetry(t, addr)
                defer clientB.Close()

                // Give the server a moment to register both clients.
                time.Sleep(200 * time.Millisecond)

                if _, err := fmt.Fprintln(clientA, "hello"); err != nil {
                    t.Fatalf("send: %v", err)
                }

                clientB.SetReadDeadline(time.Now().Add(3 * time.Second))
                line, err := bufio.NewReader(clientB).ReadString('\n')
                if err != nil {
                    t.Fatalf("client B never received the broadcast: %v", err)
                }
                if !strings.Contains(line, "hello") {
                    t.Errorf("client B got %q, want a line containing the message", line)
                }

                // The sender must NOT receive its own message.
                clientA.SetReadDeadline(time.Now().Add(300 * time.Millisecond))
                if echoed, err := bufio.NewReader(clientA).ReadString('\n'); err == nil {
                    t.Errorf("client A received its own message back: %q", echoed)
                }
            }
          solution: |-
            type ChatServer struct {
                mu      sync.Mutex
                clients map[net.Conn]string
            }

            func (s *ChatServer) broadcast(sender net.Conn, msg string) {
                s.mu.Lock()
                defer s.mu.Unlock()
                name := s.clients[sender]
                for conn := range s.clients {
                    if conn != sender {
                        fmt.Fprintf(conn, "[%s]: %s\n", name, msg)
                    }
                }
            }

            func (s *ChatServer) handleClient(conn net.Conn) {
                defer conn.Close()
                name := conn.RemoteAddr().String()
                s.mu.Lock()
                s.clients[conn] = name
                s.mu.Unlock()
                defer func() {
                    s.mu.Lock()
                    delete(s.clients, conn)
                    s.mu.Unlock()
                }()
                scanner := bufio.NewScanner(conn)
                for scanner.Scan() {
                    s.broadcast(conn, scanner.Text())
                }
            }

            func runChatServer(addr string) error {
                ln, err := net.Listen("tcp", addr)
                if err != nil {
                    return err
                }
                defer ln.Close()
                s := &ChatServer{clients: make(map[net.Conn]string)}
                for {
                    conn, err := ln.Accept()
                    if err != nil {
                        continue
                    }
                    go s.handleClient(conn)
                }
            }
          annotations:
            - type: pattern
              label: Client Broadcast Pattern
              text: "Broadcast pattern: mutex-protected client set, iterate and write to each connection"
            - type: gotcha
              label: Stale Conn Detection
              text: Writing to a disconnected conn returns an error — use that to detect and clean up stale clients
        - id: v3
          title: TCP Connection Pool
          description: >-
            Build a connection pool that maintains N persistent TCP connections to a server. <code>Get()</code> returns
            a connection (blocking if none available). <code>Put(conn)</code> returns it. <code>Close()</code> drains
            the pool. Use a buffered channel as the pool.
          functionSignature: func NewConnPool(addr string, size int) (*ConnPool, error)
          difficulty: 3
          testCases:
            - input: pool of 3, Get() 3 times
              output: returns 3 connections, 4th blocks
            - input: Get() then Put()
              output: connection reusable
            - input: Close()
              output: all connections closed, Get() returns error
          hints:
            - title: Think about it
              content: A buffered channel of size N naturally limits concurrency. How do you handle the pool being closed?
            - title: Hint
              content: >-
                Pool struct has <code>conns chan net.Conn</code> and <code>closed bool</code>. Pre-fill with Dial. Get
                reads from channel, Put writes back. Close drains and closes all conns.
          stubGo: |-
            type ConnPool struct {
                conns  chan net.Conn
                addr   string
                mu     sync.Mutex
                closed bool
            }

            func NewConnPool(addr string, size int) (*ConnPool, error) {
                panic("implement me")
            }

            func (p *ConnPool) Get() (net.Conn, error) {
                panic("implement me")
            }

            func (p *ConnPool) Put(conn net.Conn) {
                panic("implement me")
            }

            func (p *ConnPool) Close() {
                panic("implement me")
            }
          testGo: |-
            func startEchoListener(t *testing.T) string {
                t.Helper()
                ln, err := net.Listen("tcp", "127.0.0.1:0")
                if err != nil {
                    t.Fatal(err)
                }
                t.Cleanup(func() { ln.Close() })
                go func() {
                    for {
                        conn, err := ln.Accept()
                        if err != nil {
                            return
                        }
                        go func(c net.Conn) {
                            buf := make([]byte, 1024)
                            for {
                                if _, err := c.Read(buf); err != nil {
                                    c.Close()
                                    return
                                }
                            }
                        }(conn)
                    }
                }()
                return ln.Addr().String()
            }

            func TestPoolGetAndPut(t *testing.T) {
                addr := startEchoListener(t)
                pool, err := NewConnPool(addr, 2)
                if err != nil {
                    t.Fatalf("NewConnPool: %v", err)
                }
                defer pool.Close()

                c1, err := pool.Get()
                if err != nil || c1 == nil {
                    t.Fatalf("Get 1: (%v, %v)", c1, err)
                }
                c2, err := pool.Get()
                if err != nil || c2 == nil {
                    t.Fatalf("Get 2: (%v, %v)", c2, err)
                }

                pool.Put(c1)
                c3, err := pool.Get()
                if err != nil || c3 == nil {
                    t.Fatalf("Get after Put: (%v, %v) — returned connections must be reusable", c3, err)
                }
            }

            func TestPoolGetBlocksWhenEmpty(t *testing.T) {
                addr := startEchoListener(t)
                pool, err := NewConnPool(addr, 1)
                if err != nil {
                    t.Fatalf("NewConnPool: %v", err)
                }
                defer pool.Close()

                held, err := pool.Get()
                if err != nil {
                    t.Fatalf("Get: %v", err)
                }

                got := make(chan net.Conn, 1)
                go func() {
                    c, _ := pool.Get()
                    got <- c
                }()

                select {
                case <-got:
                    t.Fatal("second Get returned from an empty pool — it must block until Put")
                case <-time.After(200 * time.Millisecond):
                }

                pool.Put(held)
                select {
                case c := <-got:
                    if c == nil {
                        t.Error("blocked Get returned nil after Put")
                    }
                case <-time.After(2 * time.Second):
                    t.Fatal("blocked Get never woke up after Put")
                }
            }

            func TestPoolClose(t *testing.T) {
                addr := startEchoListener(t)
                pool, err := NewConnPool(addr, 2)
                if err != nil {
                    t.Fatalf("NewConnPool: %v", err)
                }
                pool.Close()
                if _, err := pool.Get(); err == nil {
                    t.Error("Get on a closed pool must return an error")
                }
            }
          solution: |-
            type ConnPool struct {
                conns  chan net.Conn
                addr   string
                mu     sync.Mutex
                closed bool
            }

            func NewConnPool(addr string, size int) (*ConnPool, error) {
                p := &ConnPool{
                    conns: make(chan net.Conn, size),
                    addr:  addr,
                }
                for i := 0; i < size; i++ {
                    conn, err := net.Dial("tcp", addr)
                    if err != nil {
                        p.Close()
                        return nil, err
                    }
                    p.conns <- conn
                }
                return p, nil
            }

            func (p *ConnPool) Get() (net.Conn, error) {
                p.mu.Lock()
                if p.closed {
                    p.mu.Unlock()
                    return nil, fmt.Errorf("pool closed")
                }
                p.mu.Unlock()
                return <-p.conns, nil
            }

            func (p *ConnPool) Put(conn net.Conn) {
                p.mu.Lock()
                if p.closed {
                    conn.Close()
                    p.mu.Unlock()
                    return
                }
                p.mu.Unlock()
                p.conns <- conn
            }

            func (p *ConnPool) Close() {
                p.mu.Lock()
                p.closed = true
                p.mu.Unlock()
                close(p.conns)
                for conn := range p.conns {
                    conn.Close()
                }
            }
          annotations:
            - type: pattern
              label: Channel-Based Pool
              text: Buffered channel as a pool — channel size = max connections. Get/Put = receive/send.
            - type: interview
              label: Pool Design Question
              text: Connection pooling is a common systems design interview topic — understand the channel-based approach
    - id: challenge_2
      block: 2
      difficulty: 1
      concept: DNS Wire Format
      variants:
        - id: v1
          title: Decode Domain Name
          description: >-
            Write a function that decodes a DNS wire-format domain name back to a dotted string. Input is a byte slice
            and an offset. Return the domain and the new offset after the name.
          functionSignature: func decodeDomain(data []byte, offset int) (string, int)
          difficulty: 1
          testCases:
            - input: "[7]example[3]com[0] at offset 0"
              output: ("example.com", 13)
            - input: "[3]api[5]local[0] at offset 0"
              output: ("api.local", 11)
          hints:
            - title: Think about it
              content: Each label starts with a length byte. What terminates the domain name?
            - title: Hint
              content: >-
                Loop: read length byte. If 0, break. Read that many bytes as a label. Advance offset. Join labels with
                dots.
          testGo: |-
            func TestDecodeDomain(t *testing.T) {
                data := []byte{7, 'e', 'x', 'a', 'm', 'p', 'l', 'e', 3, 'c', 'o', 'm', 0}
                domain, offset := decodeDomain(data, 0)
                if domain != "example.com" {
                    t.Errorf("domain = %q, want example.com", domain)
                }
                if offset != 13 {
                    t.Errorf("offset = %d, want 13 (must consume the null terminator)", offset)
                }
            }

            func TestDecodeDomainAtOffset(t *testing.T) {
                prefix := []byte{0xAA, 0xBB, 0xCC}
                name := []byte{3, 'a', 'p', 'i', 5, 'l', 'o', 'c', 'a', 'l', 0}
                data := append(prefix, name...)

                domain, offset := decodeDomain(data, 3)
                if domain != "api.local" {
                    t.Errorf("domain = %q, want api.local", domain)
                }
                if offset != 3+11 {
                    t.Errorf("offset = %d, want %d", offset, 3+11)
                }
            }

            func TestDecodeDomainSingleLabel(t *testing.T) {
                data := []byte{9, 'l', 'o', 'c', 'a', 'l', 'h', 'o', 's', 't', 0}
                domain, _ := decodeDomain(data, 0)
                if domain != "localhost" {
                    t.Errorf("domain = %q, want localhost (no trailing dot)", domain)
                }
            }
          solution: |-
            func decodeDomain(data []byte, offset int) (string, int) {
                var labels []string
                for {
                    length := int(data[offset])
                    if length == 0 {
                        offset++
                        break
                    }
                    offset++
                    labels = append(labels, string(data[offset:offset+length]))
                    offset += length
                }
                return strings.Join(labels, "."), offset
            }
          annotations:
            - type: stdlib
              label: Binary Encoding Helpers
              text: encoding/binary.BigEndian for multi-byte fields, raw byte manipulation for variable-length labels
        - id: v2
          title: Build DNS A Record Response
          description: >-
            Write a function that takes a DNS query packet and an IP address, and builds a complete DNS response with
            one A record. Copy the query ID, set response flags (0x8180), include the original question, and append the
            answer.
          functionSignature: func buildAResponse(query []byte, ip net.IP) []byte
          difficulty: 2
          testCases:
            - input: query for example.com, ip 93.184.216.34
              output: valid DNS response with A record
            - input: query for api.local, ip 10.0.0.2
              output: response ID matches query ID
          hints:
            - title: Think about it
              content: How do you find where the question section ends in the query? What does a name pointer (0xC00C) do?
            - title: Hint
              content: >-
                Question ends after the null-terminated domain name + 4 bytes (QTYPE + QCLASS). Use 0xC00C as a pointer
                to the name at offset 12. Answer: pointer + type A (0x0001) + class IN (0x0001) + TTL (4 bytes) + length
                4 + IP.
          testGo: |-
            func buildTestQuery(id uint16, labels ...string) []byte {
                header := make([]byte, 12)
                binary.BigEndian.PutUint16(header[0:2], id)
                binary.BigEndian.PutUint16(header[2:4], 0x0100)
                binary.BigEndian.PutUint16(header[4:6], 1)

                query := header
                for _, label := range labels {
                    query = append(query, byte(len(label)))
                    query = append(query, label...)
                }
                query = append(query, 0)    // end of name
                query = append(query, 0, 1) // QTYPE A
                query = append(query, 0, 1) // QCLASS IN
                return query
            }

            func TestBuildAResponse(t *testing.T) {
                query := buildTestQuery(0xAABB, "example", "com")
                ip := net.ParseIP("93.184.216.34")

                resp := buildAResponse(query, ip)

                if got := binary.BigEndian.Uint16(resp[0:2]); got != 0xAABB {
                    t.Errorf("response ID = %#x, want 0xAABB (copy the query ID)", got)
                }
                if got := binary.BigEndian.Uint16(resp[2:4]); got != 0x8180 {
                    t.Errorf("flags = %#x, want 0x8180", got)
                }
                if got := binary.BigEndian.Uint16(resp[6:8]); got != 1 {
                    t.Errorf("ANCOUNT = %d, want 1", got)
                }

                questionEnd := 12 + 13 + 4 // header + [7]example[3]com[0] + QTYPE/QCLASS
                if !bytes.Equal(resp[12:questionEnd], query[12:questionEnd]) {
                    t.Error("question section must be copied verbatim from the query")
                }
                if resp[questionEnd] != 0xC0 || resp[questionEnd+1] != 0x0C {
                    t.Errorf("answer name = %#x %#x, want the 0xC00C pointer", resp[questionEnd], resp[questionEnd+1])
                }
                gotIP := net.IP(resp[len(resp)-4:])
                if !gotIP.Equal(net.ParseIP("93.184.216.34")) {
                    t.Errorf("answer IP = %v, want 93.184.216.34", gotIP)
                }
            }

            func TestBuildAResponseDifferentQuery(t *testing.T) {
                query := buildTestQuery(0x1234, "api", "local")
                resp := buildAResponse(query, net.ParseIP("10.0.0.2"))
                if got := binary.BigEndian.Uint16(resp[0:2]); got != 0x1234 {
                    t.Errorf("response ID = %#x, want 0x1234", got)
                }
                gotIP := net.IP(resp[len(resp)-4:])
                if !gotIP.Equal(net.ParseIP("10.0.0.2")) {
                    t.Errorf("answer IP = %v, want 10.0.0.2", gotIP)
                }
            }
          solution: |-
            func buildAResponse(query []byte, ip net.IP) []byte {
                id := binary.BigEndian.Uint16(query[0:2])
                header := make([]byte, 12)
                binary.BigEndian.PutUint16(header[0:2], id)
                binary.BigEndian.PutUint16(header[2:4], 0x8180)
                binary.BigEndian.PutUint16(header[4:6], 1) // questions
                binary.BigEndian.PutUint16(header[6:8], 1) // answers

                // Find end of question
                offset := 12
                for query[offset] != 0 {
                    offset += int(query[offset]) + 1
                }
                offset += 5 // null + QTYPE + QCLASS
                question := query[12:offset]

                // Build A record answer
                var answer []byte
                answer = append(answer, 0xC0, 0x0C)         // name pointer
                answer = append(answer, 0, 1)               // type A
                answer = append(answer, 0, 1)               // class IN
                answer = append(answer, 0, 0, 0, 60)        // TTL 60s
                answer = append(answer, 0, 4)               // data length
                answer = append(answer, ip.To4()...)         // IP

                var resp []byte
                resp = append(resp, header...)
                resp = append(resp, question...)
                resp = append(resp, answer...)
                return resp
            }
          annotations:
            - type: pattern
              label: DNS Response Layout
              text: "DNS response construction: header → question (copied from query) → answer records"
            - type: gotcha
              label: Name Pointer 0xC00C
              text: >-
                0xC00C is a pointer to offset 12 (start of question name). Pointer compression avoids repeating the
                domain name.
        - id: v3
          title: Mini DNS Resolver
          description: >-
            Build a DNS resolver that constructs a query packet from scratch, sends it to a UDP DNS server (e.g.,
            8.8.8.8:53), parses the response, and returns the resolved IP address. Handle timeouts with a 3-second
            deadline.
          functionSignature: func resolve(domain string, dnsServer string) (net.IP, error)
          difficulty: 3
          testCases:
            - input: resolve("example.com", "8.8.8.8:53")
              output: net.IP, nil
            - input: resolve("nonexistent.invalid", "8.8.8.8:53")
              output: nil, error (NXDOMAIN)
          hints:
            - title: Think about it
              content: >-
                How do you build a DNS query from scratch? What random data do you need? How do you parse the response
                to find the IP?
            - title: Hint
              content: >-
                Build header (random ID, flags 0x0100, 1 question). Encode domain name. Append QTYPE=1 (A), QCLASS=1
                (IN). Send via UDP with 3s deadline. Parse response: skip to answer section, read the last 4 bytes as
                the IP.
          stubGo: |-
            func resolve(domain string, dnsServer string) (net.IP, error) {
                panic("implement me")
            }
          testGo: |-
            // encodeDomain is provided as scaffolding — the exercise is the resolver.
            func encodeDomain(domain string) []byte {
                var out []byte
                for _, label := range strings.Split(domain, ".") {
                    out = append(out, byte(len(label)))
                    out = append(out, label...)
                }
                return append(out, 0)
            }

            // startFakeDNS runs a local UDP DNS server so tests never touch the network.
            // It answers every A query for a known domain with 10.1.2.3 and returns
            // NXDOMAIN (rcode 3) for anything containing "nonexistent".
            func startFakeDNS(t *testing.T) string {
                t.Helper()
                pc, err := net.ListenPacket("udp", "127.0.0.1:0")
                if err != nil {
                    t.Fatal(err)
                }
                t.Cleanup(func() { pc.Close() })

                go func() {
                    buf := make([]byte, 512)
                    for {
                        n, addr, err := pc.ReadFrom(buf)
                        if err != nil {
                            return
                        }
                        query := buf[:n]
                        nxdomain := bytes.Contains(query, []byte("nonexistent"))

                        header := make([]byte, 12)
                        copy(header[0:2], query[0:2]) // echo ID
                        if nxdomain {
                            binary.BigEndian.PutUint16(header[2:4], 0x8183) // NXDOMAIN
                        } else {
                            binary.BigEndian.PutUint16(header[2:4], 0x8180)
                            binary.BigEndian.PutUint16(header[6:8], 1) // 1 answer
                        }
                        binary.BigEndian.PutUint16(header[4:6], 1)

                        resp := append([]byte{}, header...)
                        resp = append(resp, query[12:]...) // echo question
                        if !nxdomain {
                            resp = append(resp, 0xC0, 0x0C, 0, 1, 0, 1, 0, 0, 0, 60, 0, 4)
                            resp = append(resp, 10, 1, 2, 3)
                        }
                        pc.WriteTo(resp, addr)
                    }
                }()
                return pc.LocalAddr().String()
            }

            func TestResolve(t *testing.T) {
                server := startFakeDNS(t)
                ip, err := resolve("example.com", server)
                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                if !ip.Equal(net.IPv4(10, 1, 2, 3)) {
                    t.Errorf("resolved %v, want 10.1.2.3", ip)
                }
            }

            func TestResolveNXDOMAIN(t *testing.T) {
                server := startFakeDNS(t)
                if _, err := resolve("nonexistent.invalid", server); err == nil {
                    t.Fatal("want error for NXDOMAIN response, got nil")
                }
            }
          solution: |-
            func resolve(domain string, dnsServer string) (net.IP, error) {
                // Build query
                id := uint16(rand.Intn(65535))
                header := make([]byte, 12)
                binary.BigEndian.PutUint16(header[0:2], id)
                binary.BigEndian.PutUint16(header[2:4], 0x0100) // standard query, recursion desired
                binary.BigEndian.PutUint16(header[4:6], 1)      // 1 question

                name := encodeDomain(domain)
                var question []byte
                question = append(question, name...)
                question = append(question, 0, 1) // QTYPE A
                question = append(question, 0, 1) // QCLASS IN

                var query []byte
                query = append(query, header...)
                query = append(query, question...)

                // Send via UDP
                conn, err := net.Dial("udp", dnsServer)
                if err != nil {
                    return nil, err
                }
                defer conn.Close()
                conn.SetDeadline(time.Now().Add(3 * time.Second))
                conn.Write(query)

                buf := make([]byte, 512)
                n, err := conn.Read(buf)
                if err != nil {
                    return nil, err
                }
                resp := buf[:n]

                // Check RCODE
                flags := binary.BigEndian.Uint16(resp[2:4])
                rcode := flags & 0x000F
                if rcode != 0 {
                    return nil, fmt.Errorf("DNS error: rcode %d", rcode)
                }

                // Parse answer: skip to end, last 4 bytes are the IP
                anCount := binary.BigEndian.Uint16(resp[6:8])
                if anCount == 0 {
                    return nil, fmt.Errorf("no answers")
                }
                // IP is the last 4 bytes of the response for a simple A record
                ip := net.IP(resp[n-4 : n])
                return ip, nil
            }
          annotations:
            - type: interview
              label: DNS Resolver Deep Dive
              text: >-
                Building a DNS resolver from scratch demonstrates deep protocol understanding — impressive in systems
                interviews
            - type: complexity
              label: Query Time Cost
              text: O(1) for a single query, but real resolvers cache results and handle retries
