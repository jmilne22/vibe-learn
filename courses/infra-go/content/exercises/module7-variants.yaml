sharedContent: {}
decisionSets:
  - id: control-cancel-tree
    family: go-concurrency-control
    prompt: One request starts several goroutines and all of them must stop when the client disconnects. Which mechanism carries that cancellation through the call tree?
    options:
      - { id: context, label: context.Context, description: Propagate cancellation and deadlines across API boundaries. }
      - { id: waitgroup, label: sync.WaitGroup, description: Wait for goroutines after they stop. }
      - { id: mutex, label: sync.Mutex, description: Protect a critical section. }
    answer: context
    explanation: Context is designed to propagate request-scoped cancellation and deadlines. A WaitGroup can wait for cleanup but cannot request it.
  - id: control-bounded-parallelism
    family: go-concurrency-control
    prompt: You have 50,000 jobs but the dependency permits only 20 concurrent calls. Which pattern directly bounds concurrency?
    options:
      - { id: pool, label: Fixed worker pool, description: A fixed number of workers consume a larger job queue. }
      - { id: goroutine, label: Goroutine per job, description: Start all jobs immediately. }
      - { id: waitgroup, label: WaitGroup only, description: Count jobs without limiting how many run. }
    answer: pool
    explanation: A fixed worker pool separates queue size from active concurrency. A WaitGroup observes completion but does not impose a limit.
  - id: control-first-event
    family: go-concurrency-control
    prompt: Continue when a result arrives, a timeout fires, or cancellation is requested—whichever happens first. Which construct expresses this choice?
    options:
      - { id: select, label: select, description: Wait on several channel operations at once. }
      - { id: range, label: range, description: Consume one channel until it closes. }
      - { id: mutex, label: sync.Mutex, description: Serialize shared-memory access. }
    answer: select
    explanation: select waits on multiple channel cases, including a result, a timer channel, and ctx.Done, and proceeds with the first ready case.
variants:
  warmups:
    - id: warmup_1
      concept: Select
      decisionFamily: go-concurrency-control
      strategy: select
      confusableWith: [context, worker-pool]
      variants:
        - id: v1
          title: Select with Timeout
          description: >-
            Write a function that reads from a channel with a 500ms timeout. If data arrives, return it. If timeout
            fires, return an error.
          hints:
            - >-
              Use <code>select</code> with <code>case val := <-ch</code> and <code>case
              <-time.After(500*time.Millisecond)</code>
          driverGo: |-
            ch := make(chan string, 1)
            ch <- "pod-ready"
            val, err := readWithTimeout(ch)
            fmt.Println(val, err)
            _, err = readWithTimeout(make(chan string))
            fmt.Println("timeout error:", err != nil)
          solution: |-
            func readWithTimeout(ch <-chan string) (string, error) {
                select {
                case val := <-ch:
                    return val, nil
                case <-time.After(500 * time.Millisecond):
                    return "", fmt.Errorf("timeout")
                }
            }
        - id: v2
          title: Non-Blocking Send
          description: >-
            Write a function <code>trySend(ch chan<- string, val string) bool</code> that sends val on ch without
            blocking. Returns true if sent, false if channel is full.
          hints:
            - Use <code>select</code> with <code>case ch <- val</code> and <code>default</code>
          driverGo: |-
            ch := make(chan string, 1)
            fmt.Println("first send:", trySend(ch, "deploy-started"))
            fmt.Println("second send:", trySend(ch, "deploy-finished"))
            fmt.Println("buffered:", <-ch)
          solution: |-
            func trySend(ch chan<- string, val string) bool {
                select {
                case ch <- val:
                    return true
                default:
                    return false
                }
            }
    - id: warmup_2
      concept: Context
      decisionFamily: go-concurrency-control
      strategy: context
      confusableWith: [select, timeout-only]
      variants:
        - id: v1
          title: Context with Timeout
          description: >-
            Create a context with 2-second timeout. Write a function that simulates work by sleeping for a given
            duration, checking <code>ctx.Done()</code>. Call it with 1s (succeeds) and 3s (times out).
          hints:
            - Use <code>context.WithTimeout(context.Background(), 2*time.Second)</code>
            - "Check: <code>select { case <-ctx.Done(): return ctx.Err(); case <-time.After(d): return nil }</code>"
          solution: |-
            func doWork(ctx context.Context, duration time.Duration) error {
                select {
                case <-ctx.Done():
                    return ctx.Err()
                case <-time.After(duration):
                    return nil
                }
            }

            ctx, cancel := context.WithTimeout(context.Background(), 2*time.Second)
            defer cancel()
            fmt.Println(doWork(ctx, 1*time.Second))  // nil
            fmt.Println(doWork(ctx, 3*time.Second))  // context deadline exceeded
        - id: v2
          title: Cancellable Loop
          description: >-
            Write a function <code>processUntilCancelled(ctx context.Context, items []string) int</code> that processes
            items one at a time (print each), checking for context cancellation before each item. Return how many were
            processed.
          hints:
            - "Check <code>select { case <-ctx.Done(): return count; default: }</code> before processing"
          driverGo: |-
            n := processUntilCancelled(context.Background(), []string{"pod-a", "pod-b"})
            fmt.Println("processed:", n)
            ctx, cancel := context.WithCancel(context.Background())
            cancel()
            fmt.Println("after cancel:", processUntilCancelled(ctx, []string{"pod-c", "pod-d"}))
          solution: |-
            func processUntilCancelled(ctx context.Context, items []string) int {
                count := 0
                for _, item := range items {
                    select {
                    case <-ctx.Done():
                        return count
                    default:
                    }
                    fmt.Println("processing:", item)
                    count++
                }
                return count
            }
    - id: warmup_3
      concept: Worker Pools
      decisionFamily: go-concurrency-control
      strategy: worker-pool
      confusableWith: [goroutine-per-job, semaphore]
      variants:
        - id: v1
          title: Simple Worker Pool
          description: >-
            Write a worker pool with 3 workers processing strings from a jobs channel. Each worker converts the string
            to uppercase and sends to a results channel. Process 10 jobs and collect results.
          hints:
            - "Workers: <code>for job := range jobs { results <- strings.ToUpper(job) }</code>"
            - Use WaitGroup to know when to close results
          solution: |-
            jobs := make(chan string, 10)
            results := make(chan string, 10)

            var wg sync.WaitGroup
            for w := 0; w < 3; w++ {
                wg.Add(1)
                go func() {
                    defer wg.Done()
                    for job := range jobs {
                        results <- strings.ToUpper(job)
                    }
                }()
            }

            for i := 0; i < 10; i++ {
                jobs <- fmt.Sprintf("job-%d", i)
            }
            close(jobs)

            go func() {
                wg.Wait()
                close(results)
            }()

            for r := range results {
                fmt.Println(r)
            }
    - id: warmup_4
      concept: Rate Limiting
      decisionFamily: go-concurrency-control
      strategy: rate-limiter
      confusableWith: [worker-pool, timeout]
      variants:
        - id: v1
          title: Ticker Rate Limiter
          description: >-
            Write code that processes 10 items at a rate of 5 per second using <code>time.NewTicker</code>. Print each
            item as it is processed, then print whether the whole batch took at least ~2 seconds — proof the ticker
            actually paced the work.
          hints:
            - "Ticker interval: <code>200 * time.Millisecond</code> for 5/sec"
            - Wait on <code><-ticker.C</code> before each item
          solution: |-
            ticker := time.NewTicker(200 * time.Millisecond)
            defer ticker.Stop()

            start := time.Now()
            for i := 0; i < 10; i++ {
                <-ticker.C
                fmt.Printf("item %d processed\n", i)
            }
            // 10 items x 200ms = ~2s when properly rate limited
            fmt.Println("rate limited:", time.Since(start) >= 1900*time.Millisecond)
  challenges:
    - id: challenge_1
      block: 1
      difficulty: 2
      concept: Worker Pools
      variants:
        - id: v1
          title: Config Validator Pool
          description: >-
            Write a worker pool that validates config files concurrently. <code>validateConfigs(paths []string, workers
            int) map[string]error</code>. Workers read paths from a jobs channel, validate each (simulate: error if
            filename contains 'bad'), and send results. Collect into a map of path→error (nil for valid).
          functionSignature: func validateConfigs(paths []string, workers int) map[string]error
          difficulty: 1
          testCases:
            - input: validateConfigs([]string{"good.yaml", "bad.yaml", "ok.yaml"}, 2)
              output: map[good.yaml:<nil> bad.yaml:error ok.yaml:<nil>]
          hints:
            - title: Think about it
              content: Jobs channel sends paths. Workers validate and send result structs. Main collects into a map.
            - title: Hint
              content: >-
                Result struct: <code>{Path string; Err error}</code>. Workers range over jobs, send results. Main
                collects len(paths) results.
          testGo: |-
            func TestValidateConfigs(t *testing.T) {
                paths := []string{"good.yaml", "bad.yaml", "ok.yaml", "very-bad.yaml"}
                got := validateConfigs(paths, 2)

                if len(got) != len(paths) {
                    t.Fatalf("got %d entries, want %d — every path needs a result", len(got), len(paths))
                }
                for _, p := range []string{"good.yaml", "ok.yaml"} {
                    if err, present := got[p]; !present || err != nil {
                        t.Errorf("got[%s] = %v (present=%v), want nil error", p, err, present)
                    }
                }
                for _, p := range []string{"bad.yaml", "very-bad.yaml"} {
                    if got[p] == nil {
                        t.Errorf("got[%s] = nil, want a validation error", p)
                    }
                }
            }

            func TestValidateConfigsSingleWorker(t *testing.T) {
                got := validateConfigs([]string{"a.yaml", "bad.yaml"}, 1)
                if len(got) != 2 {
                    t.Fatalf("got %d entries with 1 worker, want 2", len(got))
                }
            }

            func TestValidateConfigsEmpty(t *testing.T) {
                got := validateConfigs(nil, 3)
                if len(got) != 0 {
                    t.Errorf("got %v for no paths, want empty map", got)
                }
            }
          solution: |-
            type valResult struct {
                Path string
                Err  error
            }

            func validateConfigs(paths []string, workers int) map[string]error {
                jobs := make(chan string, len(paths))
                results := make(chan valResult, len(paths))

                var wg sync.WaitGroup
                for w := 0; w < workers; w++ {
                    wg.Add(1)
                    go func() {
                        defer wg.Done()
                        for path := range jobs {
                            var err error
                            if strings.Contains(path, "bad") {
                                err = fmt.Errorf("validation failed: %s", path)
                            }
                            results <- valResult{Path: path, Err: err}
                        }
                    }()
                }

                for _, p := range paths {
                    jobs <- p
                }
                close(jobs)

                go func() {
                    wg.Wait()
                    close(results)
                }()

                out := make(map[string]error)
                for r := range results {
                    out[r.Path] = r.Err
                }
                return out
            }
          annotations:
            - type: pattern
              label: Worker pool
              text: Jobs channel → N workers → results channel. The fundamental concurrent processing pattern in Go.
            - type: idiom
              label: Close coordination
              text: Close jobs after sending. WaitGroup + closer goroutine closes results after all workers finish.
        - id: v2
          title: Concurrent API Fetcher
          description: >-
            Write <code>fetchAll(ctx context.Context, urls []string, maxConcurrent int) ([]Response, error)</code>.
            Fetch URLs concurrently with bounded concurrency. If context is cancelled, stop launching new fetches.
            Return results in any order. Cancel everything on first error.
          functionSignature: func fetchAll(ctx context.Context, urls []string, maxConcurrent int) ([]Response, error)
          difficulty: 2
          testCases:
            - input: fetchAll(ctx, urls, 3) // all succeed
              output: ([]Response{...}, nil)
            - input: fetchAll(cancelledCtx, urls, 3)
              output: (nil, context.Canceled)
          hints:
            - title: Think about it
              content: >-
                Semaphore for bounded concurrency. Context for cancellation. First error cancels everything via a
                derived context.
            - title: Hint
              content: >-
                Create a derived context with <code>context.WithCancel(ctx)</code>. On first error, call cancel.
                Semaphore: <code>make(chan struct{}, maxConcurrent)</code>.
          stubGo: |-
            type Response struct {
                URL    string
                Status int
                Err    error
            }

            func fetchAll(ctx context.Context, urls []string, maxConcurrent int) ([]Response, error) {
                panic("implement me")
            }
          testGo: |-
            func TestFetchAllSuccess(t *testing.T) {
                var inFlight, maxInFlight atomic.Int32
                server := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    cur := inFlight.Add(1)
                    for {
                        prev := maxInFlight.Load()
                        if cur <= prev || maxInFlight.CompareAndSwap(prev, cur) {
                            break
                        }
                    }
                    time.Sleep(30 * time.Millisecond)
                    inFlight.Add(-1)
                    fmt.Fprint(w, "ok")
                }))
                defer server.Close()

                urls := make([]string, 9)
                for i := range urls {
                    urls[i] = fmt.Sprintf("%s/page-%d", server.URL, i)
                }

                got, err := fetchAll(context.Background(), urls, 3)
                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                if len(got) != len(urls) {
                    t.Fatalf("got %d responses, want %d", len(got), len(urls))
                }
                for _, r := range got {
                    if r.Status != 200 {
                        t.Errorf("%s status = %d, want 200", r.URL, r.Status)
                    }
                }
                if observed := maxInFlight.Load(); observed > 3 {
                    t.Errorf("observed %d concurrent requests, want at most 3", observed)
                }
            }

            func TestFetchAllFirstErrorWins(t *testing.T) {
                server := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    fmt.Fprint(w, "ok")
                }))
                dead := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {}))
                dead.Close() // connections to this URL now fail

                urls := []string{server.URL, dead.URL, server.URL}
                defer server.Close()

                if _, err := fetchAll(context.Background(), urls, 3); err == nil {
                    t.Fatal("want error when one fetch fails, got nil")
                }
            }

            func TestFetchAllCancelledContext(t *testing.T) {
                ctx, cancel := context.WithCancel(context.Background())
                cancel()

                server := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    fmt.Fprint(w, "ok")
                }))
                defer server.Close()

                done := make(chan struct{})
                go func() {
                    defer close(done)
                    if _, err := fetchAll(ctx, []string{server.URL, server.URL}, 2); err == nil {
                        t.Error("want error for cancelled context, got nil")
                    }
                }()
                select {
                case <-done:
                case <-time.After(3 * time.Second):
                    t.Fatal("fetchAll hung on a cancelled context")
                }
            }
          solution: |-
            type Response struct {
                URL    string
                Status int
                Err    error
            }

            func fetchAll(ctx context.Context, urls []string, maxConcurrent int) ([]Response, error) {
                ctx, cancel := context.WithCancel(ctx)
                defer cancel()

                sem := make(chan struct{}, maxConcurrent)
                results := make(chan Response, len(urls))

                var wg sync.WaitGroup
                for _, u := range urls {
                    select {
                    case <-ctx.Done():
                        break
                    case sem <- struct{}{}:
                    }
                    wg.Add(1)
                    go func(url string) {
                        defer wg.Done()
                        defer func() { <-sem }()
                        req, _ := http.NewRequestWithContext(ctx, "GET", url, nil)
                        resp, err := http.DefaultClient.Do(req)
                        if err != nil {
                            results <- Response{URL: url, Err: err}
                            cancel()
                            return
                        }
                        resp.Body.Close()
                        results <- Response{URL: url, Status: resp.StatusCode}
                    }(u)
                }

                go func() {
                    wg.Wait()
                    close(results)
                }()

                var all []Response
                for r := range results {
                    if r.Err != nil {
                        return nil, r.Err
                    }
                    all = append(all, r)
                }
                return all, nil
            }
          annotations:
            - type: pattern
              label: Cancel on first error
              text: Derive a context with cancel. On error, call cancel() to stop all in-flight work.
            - type: interview
              label: Bounded fetch
              text: This combines semaphore, context, and error propagation — a frequent Go systems interview question.
        - id: v3
          title: Pipeline with Fan-Out Workers
          description: >-
            Build a 3-stage pipeline: Stage 1 generates file paths. Stage 2 fans out to N workers that read and validate
            files. Stage 3 collects results and produces a summary. Use context for cancellation. Write
            <code>lintPipeline(ctx context.Context, root string, workers int) (Summary, error)</code>.
          functionSignature: func lintPipeline(ctx context.Context, root string, workers int) (Summary, error)
          difficulty: 3
          testCases:
            - input: lintPipeline(ctx, "./configs", 4)
              output: Summary{Total:10, Valid:8, Invalid:2}
          hints:
            - title: Think about it
              content: >-
                Stage 1 walks the directory and sends paths to a channel. Stage 2 has N workers reading from that
                channel. Stage 3 aggregates results.
            - title: Hint
              content: >-
                Stage 1: goroutine with WalkDir, sends to paths channel, closes it. Stage 2: N workers range over paths,
                send LintResult to results. Stage 3: range over results, count valid/invalid.
          stubGo: |-
            type LintResult struct {
                Path  string
                Valid bool
                Err   string
            }
            type Summary struct {
                Total, Valid, Invalid int
            }

            func lintPipeline(ctx context.Context, root string, workers int) (Summary, error) {
                panic("implement me")
            }
          testGo: |-
            func TestLintPipeline(t *testing.T) {
                root := t.TempDir()
                write := func(name, content string) {
                    t.Helper()
                    if err := os.WriteFile(filepath.Join(root, name), []byte(content), 0o644); err != nil {
                        t.Fatal(err)
                    }
                }
                write("a.yaml", "kind: Pod\n")
                write("b.yaml", "replicas: 3\n")
                write("c.yaml", "name: svc\n")
                write("broken1.yaml", "a: [unclosed\n")
                write("broken2.yaml", "x: {{nope\n")
                write("ignored.txt", "not yaml at all")

                got, err := lintPipeline(context.Background(), root, 3)
                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                want := Summary{Total: 5, Valid: 3, Invalid: 2}
                if got != want {
                    t.Errorf("got %+v, want %+v (.txt files must be skipped)", got, want)
                }
            }

            func TestLintPipelineSingleWorker(t *testing.T) {
                root := t.TempDir()
                if err := os.WriteFile(filepath.Join(root, "one.yaml"), []byte("a: 1\n"), 0o644); err != nil {
                    t.Fatal(err)
                }
                got, err := lintPipeline(context.Background(), root, 1)
                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                if got.Total != 1 || got.Valid != 1 {
                    t.Errorf("got %+v, want Total:1 Valid:1", got)
                }
            }

            func TestLintPipelineEmptyDir(t *testing.T) {
                got, err := lintPipeline(context.Background(), t.TempDir(), 4)
                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                if got.Total != 0 {
                    t.Errorf("got %+v for empty dir, want zero summary", got)
                }
            }
          solution: |-
            type LintResult struct {
                Path  string
                Valid bool
                Err   string
            }
            type Summary struct {
                Total, Valid, Invalid int
            }

            func lintPipeline(ctx context.Context, root string, workers int) (Summary, error) {
                paths := make(chan string)
                go func() {
                    defer close(paths)
                    filepath.WalkDir(root, func(p string, d fs.DirEntry, err error) error {
                        if err != nil || d.IsDir() {
                            return err
                        }
                        if filepath.Ext(p) == ".yaml" {
                            select {
                            case paths <- p:
                            case <-ctx.Done():
                                return ctx.Err()
                            }
                        }
                        return nil
                    })
                }()

                results := make(chan LintResult)
                var wg sync.WaitGroup
                for i := 0; i < workers; i++ {
                    wg.Add(1)
                    go func() {
                        defer wg.Done()
                        for path := range paths {
                            data, err := os.ReadFile(path)
                            if err != nil {
                                results <- LintResult{Path: path, Err: err.Error()}
                                continue
                            }
                            var m map[string]any
                            if err := yaml.Unmarshal(data, &m); err != nil {
                                results <- LintResult{Path: path, Err: err.Error()}
                            } else {
                                results <- LintResult{Path: path, Valid: true}
                            }
                        }
                    }()
                }
                go func() {
                    wg.Wait()
                    close(results)
                }()

                var s Summary
                for r := range results {
                    s.Total++
                    if r.Valid {
                        s.Valid++
                    } else {
                        s.Invalid++
                    }
                }
                return s, nil
            }
          annotations:
            - type: pattern
              label: Multi-stage pipeline
              text: >-
                Generate → Process (fan-out) → Aggregate. Each stage connected by channels. This is production-grade
                concurrent architecture.
            - type: interview
              label: System design
              text: Building concurrent pipelines with bounded workers and cancellation is asked in senior Go interviews.
            - type: idiom
              label: WalkDir + channels
              text: WalkDir in a goroutine sending to a channel is the standard pattern for concurrent directory processing.
    - id: challenge_2
      block: 2
      difficulty: 2
      concept: Context
      variants:
        - id: v1
          title: Context-Aware Health Checker
          description: >-
            Write <code>checkHealthWithTimeout(endpoints []string, timeout time.Duration) []HealthResult</code>. Check
            all endpoints concurrently. The entire operation must complete within the timeout. Use a single context. If
            timeout fires, return whatever results were collected so far.
          functionSignature: func checkHealthWithTimeout(endpoints []string, timeout time.Duration) []HealthResult
          difficulty: 1
          testCases:
            - input: checkHealthWithTimeout(endpoints, 5*time.Second) // all fast
              output: all results
            - input: checkHealthWithTimeout(endpoints, 10*time.Millisecond) // one slow
              output: partial results
          hints:
            - title: Think about it
              content: Create a context with timeout. Pass it to all goroutines. Collect results until timeout or all done.
            - title: Hint
              content: >-
                Use a buffered results channel. After launching goroutines, collect with select: <code>case r :=
                <-results</code> or <code>case <-ctx.Done()</code>.
          stubGo: |-
            type HealthResult struct {
                URL     string
                Healthy bool
            }

            func checkHealthWithTimeout(endpoints []string, timeout time.Duration) []HealthResult {
                panic("implement me")
            }
          testGo: |-
            func TestCheckHealthWithTimeoutAllFast(t *testing.T) {
                healthy := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {}))
                defer healthy.Close()
                sick := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    w.WriteHeader(http.StatusInternalServerError)
                }))
                defer sick.Close()

                got := checkHealthWithTimeout([]string{healthy.URL, sick.URL}, 5*time.Second)
                if len(got) != 2 {
                    t.Fatalf("got %d results, want 2", len(got))
                }
                byURL := map[string]bool{}
                for _, r := range got {
                    byURL[r.URL] = r.Healthy
                }
                if !byURL[healthy.URL] {
                    t.Errorf("%s reported unhealthy, want healthy", healthy.URL)
                }
                if byURL[sick.URL] {
                    t.Errorf("%s reported healthy, want unhealthy (500)", sick.URL)
                }
            }

            func TestCheckHealthWithTimeoutPartialResults(t *testing.T) {
                fast := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {}))
                defer fast.Close()
                slow := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                    time.Sleep(3 * time.Second)
                }))
                defer slow.Close()

                start := time.Now()
                got := checkHealthWithTimeout([]string{fast.URL, slow.URL}, 400*time.Millisecond)
                elapsed := time.Since(start)

                if elapsed > 2*time.Second {
                    t.Errorf("returned after %v — must give up at the 400ms timeout", elapsed)
                }
                if len(got) > 2 {
                    t.Errorf("got %d results for 2 endpoints", len(got))
                }
            }
          solution: |-
            type HealthResult struct {
                URL     string
                Healthy bool
            }

            func checkHealthWithTimeout(endpoints []string, timeout time.Duration) []HealthResult {
                ctx, cancel := context.WithTimeout(context.Background(), timeout)
                defer cancel()

                results := make(chan HealthResult, len(endpoints))
                for _, ep := range endpoints {
                    go func(url string) {
                        req, _ := http.NewRequestWithContext(ctx, "GET", url, nil)
                        resp, err := http.DefaultClient.Do(req)
                        if err != nil {
                            results <- HealthResult{URL: url, Healthy: false}
                            return
                        }
                        resp.Body.Close()
                        results <- HealthResult{URL: url, Healthy: resp.StatusCode == 200}
                    }(ep)
                }

                var all []HealthResult
                for i := 0; i < len(endpoints); i++ {
                    select {
                    case r := <-results:
                        all = append(all, r)
                    case <-ctx.Done():
                        return all
                    }
                }
                return all
            }
          annotations:
            - type: pattern
              label: Deadline collection
              text: Collect as many results as possible before the deadline. Return partial results instead of failing.
            - type: idiom
              label: Context in requests
              text: >-
                NewRequestWithContext propagates the timeout to the HTTP client. Cancelled context cancels in-flight
                requests.
        - id: v2
          title: Graceful Shutdown Handler
          description: >-
            Write a function that starts a simulated service (processes jobs from a channel in a loop). On SIGINT
            (simulated via context cancellation), it should: stop accepting new jobs, finish the current job, and return
            the count of processed jobs. Use <code>select</code> with <code>ctx.Done()</code>.
          functionSignature: func runService(ctx context.Context, jobs <-chan string) int
          difficulty: 2
          testCases:
            - input: runService(ctx, jobs) // 5 jobs then cancel
              output: "5"
            - input: runService(cancelledCtx, jobs)
              output: "0"
          hints:
            - title: Think about it
              content: Select between jobs and ctx.Done(). When cancelled, return immediately. Count processed jobs.
            - title: Hint
              content: >-
                Loop with select: <code>case job, ok := <-jobs</code> (process), <code>case <-ctx.Done()</code> (return
                count). Check <code>!ok</code> for closed channel.
          testGo: |-
            func TestRunServiceDrainsClosedChannel(t *testing.T) {
                jobs := make(chan string, 5)
                for i := 0; i < 5; i++ {
                    jobs <- fmt.Sprintf("job-%d", i)
                }
                close(jobs)

                got := runService(context.Background(), jobs)
                if got != 5 {
                    t.Errorf("processed %d jobs, want 5 (drain the channel until closed)", got)
                }
            }

            func TestRunServiceCancelledBeforeWork(t *testing.T) {
                ctx, cancel := context.WithCancel(context.Background())
                cancel()
                jobs := make(chan string) // nothing ever arrives

                done := make(chan int, 1)
                go func() { done <- runService(ctx, jobs) }()

                select {
                case got := <-done:
                    if got != 0 {
                        t.Errorf("processed %d jobs on a cancelled context, want 0", got)
                    }
                case <-time.After(2 * time.Second):
                    t.Fatal("runService did not return on a cancelled context")
                }
            }

            func TestRunServiceStopsOnCancel(t *testing.T) {
                ctx, cancel := context.WithCancel(context.Background())
                jobs := make(chan string) // unbuffered, never closed

                done := make(chan int, 1)
                go func() { done <- runService(ctx, jobs) }()

                jobs <- "one"
                jobs <- "two"
                cancel()

                select {
                case got := <-done:
                    if got != 2 {
                        t.Errorf("processed %d jobs, want 2 (finish current work, then stop)", got)
                    }
                case <-time.After(2 * time.Second):
                    t.Fatal("runService did not return after cancellation")
                }
            }
          solution: |-
            func runService(ctx context.Context, jobs <-chan string) int {
                count := 0
                for {
                    select {
                    case <-ctx.Done():
                        fmt.Println("shutting down, processed", count)
                        return count
                    case job, ok := <-jobs:
                        if !ok {
                            return count
                        }
                        fmt.Println("processing:", job)
                        count++
                    }
                }
            }
          annotations:
            - type: pattern
              label: Service loop
              text: >-
                for + select is the core pattern for long-running Go services. Handle jobs, ticks, and shutdown in one
                loop.
            - type: interview
              label: Graceful shutdown
              text: Every Go service needs graceful shutdown. K8s sends SIGTERM, you need to drain in-flight work.
        - id: v3
          title: Cascading Cancellation
          description: >-
            Build a 3-level call chain: <code>handler → service → store</code>. The handler creates a context with 5s
            timeout. The service derives a child context with 2s timeout for each store call. If the store is slow, the
            service should cancel and try a fallback. If the handler times out, everything stops. Demonstrate with
            simulated delays.
          functionSignature: func handler(ctx context.Context) (string, error)
          difficulty: 3
          testCases:
            - input: handler(ctx) // store responds in 1s
              output: ("data from store", nil)
            - input: handler(ctx) // store slow, fallback works
              output: ("data from fallback", nil)
            - input: handler(cancelledCtx)
              output: ("", context error)
          hints:
            - title: Think about it
              content: >-
                Handler sets overall timeout. Service creates child context for store call. If store times out, service
                tries fallback with remaining time.
            - title: Hint
              content: >-
                Service: <code>storeCtx, cancel := context.WithTimeout(ctx, 2*time.Second)</code>. Try store. If
                deadline exceeded, try fallback with the parent ctx (which still has time).
          stubGo: |-
            // Simulated backends — store is slow (3s), fallback is fast (500ms).
            // You implement service() and handler() on top of them.
            func store(ctx context.Context) (string, error) {
                select {
                case <-ctx.Done():
                    return "", ctx.Err()
                case <-time.After(3 * time.Second):
                    return "data from store", nil
                }
            }

            func fallback(ctx context.Context) (string, error) {
                select {
                case <-ctx.Done():
                    return "", ctx.Err()
                case <-time.After(500 * time.Millisecond):
                    return "data from fallback", nil
                }
            }

            func service(ctx context.Context) (string, error) {
                panic("implement me")
            }

            func handler(ctx context.Context) (string, error) {
                panic("implement me")
            }
          testGo: |-
            func TestHandlerFallsBack(t *testing.T) {
                start := time.Now()
                got, err := handler(context.Background())
                elapsed := time.Since(start)

                if err != nil {
                    t.Fatalf("unexpected error: %v", err)
                }
                if got != "data from fallback" {
                    t.Errorf("got %q, want data from fallback (store is too slow for its 2s budget)", got)
                }
                if elapsed < 1500*time.Millisecond {
                    t.Errorf("returned in %v — the store call must get its full 2s before falling back", elapsed)
                }
                if elapsed > 4*time.Second {
                    t.Errorf("took %v — fallback should complete well inside the 5s handler budget", elapsed)
                }
            }

            func TestHandlerCancelledUpfront(t *testing.T) {
                ctx, cancel := context.WithCancel(context.Background())
                cancel()

                done := make(chan struct{})
                var got string
                var err error
                go func() {
                    defer close(done)
                    got, err = handler(ctx)
                }()

                select {
                case <-done:
                case <-time.After(2 * time.Second):
                    t.Fatal("handler did not return promptly on a cancelled context")
                }
                if err == nil {
                    t.Errorf("got (%q, nil), want a context error", got)
                }
            }
          solution: |-
            func store(ctx context.Context) (string, error) {
                select {
                case <-ctx.Done():
                    return "", ctx.Err()
                case <-time.After(3 * time.Second): // simulated slow
                    return "data from store", nil
                }
            }

            func fallback(ctx context.Context) (string, error) {
                select {
                case <-ctx.Done():
                    return "", ctx.Err()
                case <-time.After(500 * time.Millisecond):
                    return "data from fallback", nil
                }
            }

            func service(ctx context.Context) (string, error) {
                storeCtx, cancel := context.WithTimeout(ctx, 2*time.Second)
                defer cancel()

                result, err := store(storeCtx)
                if err == nil {
                    return result, nil
                }
                fmt.Println("store timed out, trying fallback")
                return fallback(ctx) // use parent context — may still have time
            }

            func handler(ctx context.Context) (string, error) {
                ctx, cancel := context.WithTimeout(ctx, 5*time.Second)
                defer cancel()
                return service(ctx)
            }
          annotations:
            - type: pattern
              label: Context hierarchy
              text: >-
                Parent timeout > child timeout. Child can timeout without killing the parent, allowing fallback
                strategies.
            - type: interview
              label: Context design
              text: Understanding context hierarchy and cascading cancellation is a senior Go interview topic.
            - type: gotcha
              label: Always defer cancel
              text: >-
                Every WithTimeout/WithCancel must have a deferred cancel. Forgetting leaks goroutines in the context
                tree.
