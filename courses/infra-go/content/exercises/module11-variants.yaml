variants:
  warmups:
    - id: warmup_1
      concept: client-go
      variants:
        - id: v1
          title: List Pods by Label
          description: >-
            Write a function that lists all pods in a namespace matching a label selector. Return a slice of pod names.
            The driver seeds a fake clientset (<code>k8s.io/client-go/kubernetes/fake</code>) with three pods — no real
            cluster needed; the fake applies label selectors just like the API server.
          hints:
            - "Use <code>clientset.CoreV1().Pods(namespace).List(ctx, metav1.ListOptions{LabelSelector: selector})</code>"
            - Iterate <code>pods.Items</code> and collect <code>pod.Name</code>
          solution: |-
            func listPodsByLabel(clientset kubernetes.Interface, namespace, selector string) ([]string, error) {
                pods, err := clientset.CoreV1().Pods(namespace).List(
                    context.Background(),
                    metav1.ListOptions{LabelSelector: selector},
                )
                if err != nil {
                    return nil, err
                }
                var names []string
                for _, pod := range pods.Items {
                    names = append(names, pod.Name)
                }
                return names, nil
            }
          driverGo: |-
            clientset := fake.NewClientset(
                &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-1", Namespace: "default", Labels: map[string]string{"app": "web"}}},
                &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-2", Namespace: "default", Labels: map[string]string{"app": "web"}}},
                &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "db-1", Namespace: "default", Labels: map[string]string{"app": "db"}}},
            )
            names, err := listPodsByLabel(clientset, "default", "app=web")
            if err != nil {
                fmt.Println("error:", err)
                return
            }
            sort.Strings(names)
            for _, name := range names {
                fmt.Println(name)
            }
        - id: v2
          title: Create ConfigMap
          description: >-
            Write a function that creates a ConfigMap in a given namespace with the provided key-value data. Return an
            error if creation fails. The driver runs it against a fake clientset, then reads the ConfigMap back to
            verify what was stored.
          hints:
            - >-
              Build a <code>&corev1.ConfigMap{ObjectMeta: metav1.ObjectMeta{Name: name, Namespace: ns}, Data:
              data}</code>
            - Use <code>clientset.CoreV1().ConfigMaps(ns).Create(ctx, cm, metav1.CreateOptions{})</code>
          solution: |-
            func createConfigMap(clientset kubernetes.Interface, ns, name string, data map[string]string) error {
                cm := &corev1.ConfigMap{
                    ObjectMeta: metav1.ObjectMeta{
                        Name:      name,
                        Namespace: ns,
                    },
                    Data: data,
                }
                _, err := clientset.CoreV1().ConfigMaps(ns).Create(
                    context.Background(), cm, metav1.CreateOptions{},
                )
                return err
            }
          driverGo: |-
            clientset := fake.NewClientset()
            if err := createConfigMap(clientset, "default", "app-config", map[string]string{"env": "prod", "region": "us-east-1"}); err != nil {
                fmt.Println("error:", err)
                return
            }
            cm, err := clientset.CoreV1().ConfigMaps("default").Get(
                context.Background(), "app-config", metav1.GetOptions{},
            )
            if err != nil {
                fmt.Println("error:", err)
                return
            }
            fmt.Println("created:", cm.Namespace+"/"+cm.Name)
            keys := make([]string, 0, len(cm.Data))
            for k := range cm.Data {
                keys = append(keys, k)
            }
            sort.Strings(keys)
            for _, k := range keys {
                fmt.Println(k + "=" + cm.Data[k])
            }
    - id: warmup_2
      concept: Reconciliation
      variants:
        - id: v1
          title: Idempotent Reconcile
          description: >-
            Write a reconcile function that ensures a pod has a specific annotation. If the annotation already exists
            with the correct value, do nothing. If it's missing or wrong, update the pod. This demonstrates idempotent
            reconciliation — the driver counts <code>update</code> API calls to prove the second reconcile is a no-op.
          hints:
            - Check <code>pod.Annotations[key]</code> first — if it matches, return nil (no-op)
            - If missing or different, set it and call <code>clientset.CoreV1().Pods(ns).Update(...)</code>
          solution: |-
            func ensureAnnotation(clientset kubernetes.Interface, ns, podName, key, value string) error {
                pod, err := clientset.CoreV1().Pods(ns).Get(
                    context.Background(), podName, metav1.GetOptions{},
                )
                if err != nil {
                    return err
                }
                if pod.Annotations[key] == value {
                    return nil // already correct, idempotent
                }
                if pod.Annotations == nil {
                    pod.Annotations = make(map[string]string)
                }
                pod.Annotations[key] = value
                _, err = clientset.CoreV1().Pods(ns).Update(
                    context.Background(), pod, metav1.UpdateOptions{},
                )
                return err
            }
          driverGo: |-
            clientset := fake.NewClientset(
                &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-1", Namespace: "default"}},
            )
            countUpdates := func() int {
                n := 0
                for _, action := range clientset.Actions() {
                    if action.GetVerb() == "update" {
                        n++
                    }
                }
                return n
            }
            if err := ensureAnnotation(clientset, "default", "web-1", "owner", "team-infra"); err != nil {
                fmt.Println("error:", err)
                return
            }
            fmt.Println("updates after first reconcile:", countUpdates())
            if err := ensureAnnotation(clientset, "default", "web-1", "owner", "team-infra"); err != nil {
                fmt.Println("error:", err)
                return
            }
            fmt.Println("updates after second reconcile:", countUpdates())
            pod, _ := clientset.CoreV1().Pods("default").Get(
                context.Background(), "web-1", metav1.GetOptions{},
            )
            fmt.Println("annotation:", pod.Annotations["owner"])
        - id: v2
          title: Work Queue Handler
          description: >-
            Write a <code>processNextItem</code> function for a K8s controller work queue: get an item, call reconcile,
            requeue on error with rate limiting, forget on success. The <code>WorkQueue</code> interface in the
            workspace mirrors client-go's <code>workqueue</code> API; the driver drains a recording queue so the exact
            call sequence is visible.
          hints:
            - Call <code>queue.Get()</code> to get the next item. Defer <code>queue.Done(item)</code>.
            - "On error: <code>queue.AddRateLimited(item)</code>. On success: <code>queue.Forget(item)</code>."
          solution: |-
            // WorkQueue mirrors the client-go workqueue methods a controller uses.
            type WorkQueue interface {
                Get() (item string, shutdown bool)
                Done(item string)
                AddRateLimited(item string)
                Forget(item string)
            }

            // recordingQueue is a test double: it serves items from a slice and
            // logs every call so the driver can print the exact call sequence.
            type recordingQueue struct {
                items []string
                log   []string
            }

            func (q *recordingQueue) Get() (string, bool) {
                if len(q.items) == 0 {
                    return "", true
                }
                item := q.items[0]
                q.items = q.items[1:]
                q.log = append(q.log, "get "+item)
                return item, false
            }

            func (q *recordingQueue) Done(item string) {
                q.log = append(q.log, "done "+item)
            }

            func (q *recordingQueue) AddRateLimited(item string) {
                q.log = append(q.log, "requeue "+item)
            }

            func (q *recordingQueue) Forget(item string) {
                q.log = append(q.log, "forget "+item)
            }

            func processNextItem(queue WorkQueue, reconcile func(string) error) bool {
                item, shutdown := queue.Get()
                if shutdown {
                    return false
                }
                defer queue.Done(item)

                if err := reconcile(item); err != nil {
                    queue.AddRateLimited(item)
                    return true
                }
                queue.Forget(item)
                return true
            }
          driverGo: |-
            queue := &recordingQueue{items: []string{"default/web-1", "default/web-2", "default/db-1"}}
            reconcile := func(key string) error {
                if key == "default/web-2" {
                    return errors.New("conflict: object modified")
                }
                return nil
            }
            for processNextItem(queue, reconcile) {
            }
            for _, entry := range queue.log {
                fmt.Println(entry)
            }
