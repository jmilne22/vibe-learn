  challenges:
    - id: challenge_1
      block: 1
      difficulty: 1
      concept: client-go
      variants:
        - id: v1
          title: Pod Health Reporter
          description: >-
            Write a function that lists all pods across all namespaces and returns a health report: counts of Running,
            Pending, Failed, and Unknown pods, grouped by namespace. The tests run it against a fake clientset —
            <code>seedClientset()</code> in the workspace pre-loads pods across three namespaces.
          functionSignature: func podHealthReport(clientset kubernetes.Interface) (map[string]map[string]int, error)
          difficulty: 1
          setupGo: |-
            // seedClientset returns a fake clientset pre-loaded with pods in
            // several namespaces and phases — no real cluster involved.
            func seedClientset() kubernetes.Interface {
                return fake.NewClientset(
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-1", Namespace: "default"}, Status: corev1.PodStatus{Phase: corev1.PodRunning}},
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-2", Namespace: "default"}, Status: corev1.PodStatus{Phase: corev1.PodRunning}},
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "web-3", Namespace: "default"}, Status: corev1.PodStatus{Phase: corev1.PodPending}},
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "batch-1", Namespace: "jobs"}, Status: corev1.PodStatus{Phase: corev1.PodFailed}},
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "batch-2", Namespace: "jobs"}, Status: corev1.PodStatus{Phase: corev1.PodRunning}},
                    &corev1.Pod{ObjectMeta: metav1.ObjectMeta{Name: "probe-1", Namespace: "monitoring"}, Status: corev1.PodStatus{Phase: corev1.PodUnknown}},
                )
            }
          testCases:
            - input: podHealthReport(seedClientset())
              output: "map[default:map[Pending:1 Running:2] jobs:map[Failed:1 Running:1] monitoring:map[Unknown:1]] <nil>"
            - input: podHealthReport(fake.NewClientset())
              output: "map[] <nil>"
          hints:
            - title: Think about it
              content: How do you list pods across all namespaces? What field gives you the pod phase?
            - title: Hint
              content: >-
                Use empty string for namespace to list all: Pods("").List(...). Group by pod.Namespace, count by
                string(pod.Status.Phase).
          solution: |-
            func podHealthReport(clientset kubernetes.Interface) (map[string]map[string]int, error) {
                pods, err := clientset.CoreV1().Pods("").List(
                    context.Background(), metav1.ListOptions{},
                )
                if err != nil {
                    return nil, err
                }
                report := make(map[string]map[string]int)
                for _, pod := range pods.Items {
                    ns := pod.Namespace
                    phase := string(pod.Status.Phase)
                    if report[ns] == nil {
                        report[ns] = make(map[string]int)
                    }
                    report[ns][phase]++
                }
                return report, nil
            }
          annotations:
            - type: idiom
              label: All Namespaces
              text: Empty namespace string means all namespaces — a common client-go pattern
        - id: v2
          title: ConfigMap Sync Controller
          description: >-
            Write a controller-style function that watches a source ConfigMap and syncs its data to ConfigMaps in all
            other namespaces. When the source changes, update all copies. Implement as a reconcile function that's
            called with the source ConfigMap name. The tests run it against a fake clientset seeded by
            <code>seedSyncCluster()</code>: three namespaces, the source in <code>default</code>, a stale copy in
            <code>prod</code>, and nothing yet in <code>staging</code>.
          functionSignature: func reconcileConfigSync(clientset kubernetes.Interface, sourceNS, sourceName string) error
          difficulty: 2
          setupGo: |-
            // seedSyncCluster: three namespaces, a source ConfigMap in default,
            // and a stale copy in prod (staging has none — reconcile creates it).
            func seedSyncCluster() kubernetes.Interface {
                return fake.NewClientset(
                    &corev1.Namespace{ObjectMeta: metav1.ObjectMeta{Name: "default"}},
                    &corev1.Namespace{ObjectMeta: metav1.ObjectMeta{Name: "prod"}},
                    &corev1.Namespace{ObjectMeta: metav1.ObjectMeta{Name: "staging"}},
                    &corev1.ConfigMap{ObjectMeta: metav1.ObjectMeta{Name: "app-config", Namespace: "default"}, Data: map[string]string{"env": "shared", "version": "v2"}},
                    &corev1.ConfigMap{ObjectMeta: metav1.ObjectMeta{Name: "app-config", Namespace: "prod"}, Data: map[string]string{"env": "stale", "version": "v1"}},
                )
            }

            // dumpConfigMaps prints ns:data for every namespace holding the ConfigMap.
            func dumpConfigMaps(clientset kubernetes.Interface, name string) string {
                namespaces, _ := clientset.CoreV1().Namespaces().List(context.Background(), metav1.ListOptions{})
                var out []string
                for _, ns := range namespaces.Items {
                    cm, err := clientset.CoreV1().ConfigMaps(ns.Name).Get(context.Background(), name, metav1.GetOptions{})
                    if err != nil {
                        continue
                    }
                    out = append(out, ns.Name+":"+fmt.Sprint(cm.Data))
                }
                sort.Strings(out)
                return strings.Join(out, " ")
            }
          testCases:
            - input: 'cs := seedSyncCluster(); fmt.Println(reconcileConfigSync(cs, "default", "app-config")); dumpConfigMaps(cs, "app-config")'
              output: "<nil>, then all three namespaces hold map[env:shared version:v2]"
            - input: 'cs := seedSyncCluster(); apierrors.IsNotFound(reconcileConfigSync(cs, "default", "missing"))'
              output: "true"
          hints:
            - title: Think about it
              content: How do you list all namespaces? How do you handle the create-or-update pattern?
            - title: Hint
              content: >-
                List namespaces, skip the source namespace. For each target namespace: try Get — if
                apierrors.IsNotFound, Create. If it exists, compare data and Update if different. This is the
                create-or-update pattern.
          solution: |-
            func reconcileConfigSync(clientset kubernetes.Interface, sourceNS, sourceName string) error {
                source, err := clientset.CoreV1().ConfigMaps(sourceNS).Get(
                    context.Background(), sourceName, metav1.GetOptions{},
                )
                if err != nil {
                    return err
                }

                namespaces, err := clientset.CoreV1().Namespaces().List(
                    context.Background(), metav1.ListOptions{},
                )
                if err != nil {
                    return err
                }

                for _, ns := range namespaces.Items {
                    if ns.Name == sourceNS {
                        continue
                    }
                    existing, err := clientset.CoreV1().ConfigMaps(ns.Name).Get(
                        context.Background(), sourceName, metav1.GetOptions{},
                    )
                    if apierrors.IsNotFound(err) {
                        cm := &corev1.ConfigMap{
                            ObjectMeta: metav1.ObjectMeta{
                                Name:      sourceName,
                                Namespace: ns.Name,
                            },
                            Data: source.Data,
                        }
                        if _, err := clientset.CoreV1().ConfigMaps(ns.Name).Create(
                            context.Background(), cm, metav1.CreateOptions{},
                        ); err != nil {
                            return err
                        }
                    } else if err == nil && !reflect.DeepEqual(existing.Data, source.Data) {
                        existing.Data = source.Data
                        if _, err := clientset.CoreV1().ConfigMaps(ns.Name).Update(
                            context.Background(), existing, metav1.UpdateOptions{},
                        ); err != nil {
                            return err
                        }
                    }
                }
                return nil
            }
          annotations:
            - type: pattern
              label: Create-or-Update
              text: "Create-or-Update: Get → NotFound? Create : changed? Update. The core K8s reconciliation pattern."
            - type: gotcha
              label: IsNotFound Check
              text: >-
                Always check apierrors.IsNotFound(err) (k8s.io/apimachinery/pkg/api/errors) — don't assume a Get error
                means the resource doesn't exist
        - id: v3
          title: Operator Reconciler with Finalizer
          description: >-
            Write the reconcile function for a small operator. A real operator registers
            <code>Reconcile(ctx, req)</code> with controller-runtime against a CRD; here the custom resource is played
            by a ConfigMap and the client is client-go's fake clientset — the lifecycle mechanics are identical. Your
            reconcile must: (1) add the <code>example.com/cleanup</code> finalizer on first reconcile, (2) when the CR
            is marked for deletion (<code>DeletionTimestamp</code> set), delete the rendered child ConfigMap and only
            then remove the finalizer, (3) otherwise ensure a <code>&lt;name&gt;-rendered</code> ConfigMap exists whose
            Data matches the CR's, (4) record status by setting the CR's <code>example.com/rendered</code> annotation
            to <code>"true"</code> (with a real CRD this would be the status subresource).
          functionSignature: func reconcileApp(clientset kubernetes.Interface, ns, name string) error
          difficulty: 3
          setupGo: |-
            // The "custom resource" here is played by a ConfigMap so the fake
            // clientset can store it; a real operator would define a CRD and
            // generated types, but the reconcile lifecycle is the same.
            const appFinalizer = "example.com/cleanup"

            func newAppCR(ns, name string, data map[string]string) *corev1.ConfigMap {
                return &corev1.ConfigMap{
                    ObjectMeta: metav1.ObjectMeta{Name: name, Namespace: ns},
                    Data:       data,
                }
            }

            // deletingAppCR returns the CR as the API server presents it
            // mid-deletion: DeletionTimestamp set, finalizer holding it alive.
            func deletingAppCR(ns, name string, data map[string]string) *corev1.ConfigMap {
                cr := newAppCR(ns, name, data)
                deleted := metav1.Date(2026, time.January, 1, 0, 0, 0, 0, time.UTC)
                cr.DeletionTimestamp = &deleted
                cr.Finalizers = []string{appFinalizer}
                return cr
            }

            func dumpApp(clientset kubernetes.Interface, ns, name string) string {
                var parts []string
                cr, err := clientset.CoreV1().ConfigMaps(ns).Get(context.Background(), name, metav1.GetOptions{})
                if apierrors.IsNotFound(err) {
                    parts = append(parts, "cr=gone")
                } else {
                    parts = append(parts, fmt.Sprintf("cr=present finalizers=%d rendered=%q", len(cr.Finalizers), cr.Annotations["example.com/rendered"]))
                }
                child, err := clientset.CoreV1().ConfigMaps(ns).Get(context.Background(), name+"-rendered", metav1.GetOptions{})
                if apierrors.IsNotFound(err) {
                    parts = append(parts, "child=gone")
                } else {
                    parts = append(parts, "child=present data="+fmt.Sprint(child.Data))
                }
                return strings.Join(parts, " | ")
            }
          testCases:
            - input: 'cs := fake.NewClientset(newAppCR("default", "app", map[string]string{"replicas": "3"})); fmt.Println(reconcileApp(cs, "default", "app")); dumpApp(cs, "default", "app")'
              output: finalizer added, child created, rendered annotation set
            - input: 'cs := fake.NewClientset(deletingAppCR("default", "app", map[string]string{"replicas": "3"}), &corev1.ConfigMap{ObjectMeta: metav1.ObjectMeta{Name: "app-rendered", Namespace: "default"}, Data: map[string]string{"replicas": "3"}}); fmt.Println(reconcileApp(cs, "default", "app")); dumpApp(cs, "default", "app")'
              output: child deleted, finalizer removed (the real API server would then let the CR disappear)
            - input: 'cr := newAppCR("default", "app", map[string]string{"replicas": "5"}); cr.Finalizers = []string{appFinalizer}; cr.Annotations = map[string]string{"example.com/rendered": "true"}; cs := fake.NewClientset(cr, &corev1.ConfigMap{ObjectMeta: metav1.ObjectMeta{Name: "app-rendered", Namespace: "default"}, Data: map[string]string{"replicas": "3"}}); fmt.Println(reconcileApp(cs, "default", "app")); dumpApp(cs, "default", "app")'
              output: child updated to match the changed spec
            - input: 'cs := fake.NewClientset(); fmt.Println(reconcileApp(cs, "default", "app")); dumpApp(cs, "default", "app")'
              output: CR already gone — reconcile is a no-op returning nil
          hints:
            - title: Think about it
              content: >-
                What must you check first on every reconcile? Why does the finalizer have to be added before the child
                ConfigMap is created?
            - title: Hint
              content: >-
                Check cr.DeletionTimestamp first — if set, delete the &lt;name&gt;-rendered ConfigMap (tolerate
                apierrors.IsNotFound), remove the finalizer with slices.DeleteFunc, and Update. Otherwise: add the
                finalizer if missing (slices.Contains), create-or-update the child from cr.Data, then set the
                example.com/rendered annotation to "true".
          solution: |-
            func reconcileApp(clientset kubernetes.Interface, ns, name string) error {
                cr, err := clientset.CoreV1().ConfigMaps(ns).Get(
                    context.Background(), name, metav1.GetOptions{},
                )
                if apierrors.IsNotFound(err) {
                    return nil // already gone — nothing to reconcile
                }
                if err != nil {
                    return err
                }

                childName := name + "-rendered"

                // Deletion: clean up the child, then release the finalizer. The
                // API server keeps the CR alive until the finalizer list empties.
                if cr.DeletionTimestamp != nil {
                    if slices.Contains(cr.Finalizers, appFinalizer) {
                        err := clientset.CoreV1().ConfigMaps(ns).Delete(
                            context.Background(), childName, metav1.DeleteOptions{},
                        )
                        if err != nil && !apierrors.IsNotFound(err) {
                            return err
                        }
                        cr.Finalizers = slices.DeleteFunc(cr.Finalizers, func(f string) bool {
                            return f == appFinalizer
                        })
                        if _, err := clientset.CoreV1().ConfigMaps(ns).Update(
                            context.Background(), cr, metav1.UpdateOptions{},
                        ); err != nil {
                            return err
                        }
                    }
                    return nil
                }

                // Add the finalizer before creating anything we'd have to clean up.
                if !slices.Contains(cr.Finalizers, appFinalizer) {
                    cr.Finalizers = append(cr.Finalizers, appFinalizer)
                    cr, err = clientset.CoreV1().ConfigMaps(ns).Update(
                        context.Background(), cr, metav1.UpdateOptions{},
                    )
                    if err != nil {
                        return err
                    }
                }

                // Ensure the child matches the CR spec (create-or-update).
                child, err := clientset.CoreV1().ConfigMaps(ns).Get(
                    context.Background(), childName, metav1.GetOptions{},
                )
                if apierrors.IsNotFound(err) {
                    child = &corev1.ConfigMap{
                        ObjectMeta: metav1.ObjectMeta{Name: childName, Namespace: ns},
                        Data:       cr.Data,
                    }
                    if _, err := clientset.CoreV1().ConfigMaps(ns).Create(
                        context.Background(), child, metav1.CreateOptions{},
                    ); err != nil {
                        return err
                    }
                } else if err != nil {
                    return err
                } else if !reflect.DeepEqual(child.Data, cr.Data) {
                    child.Data = cr.Data
                    if _, err := clientset.CoreV1().ConfigMaps(ns).Update(
                        context.Background(), child, metav1.UpdateOptions{},
                    ); err != nil {
                        return err
                    }
                }

                // "Status" update — with a real CRD this would be Status().Update().
                if cr.Annotations["example.com/rendered"] != "true" {
                    if cr.Annotations == nil {
                        cr.Annotations = make(map[string]string)
                    }
                    cr.Annotations["example.com/rendered"] = "true"
                    if _, err := clientset.CoreV1().ConfigMaps(ns).Update(
                        context.Background(), cr, metav1.UpdateOptions{},
                    ); err != nil {
                        return err
                    }
                }
                return nil
            }
          annotations:
            - type: pattern
              label: Reconciler Lifecycle
              text: "Full operator reconcile: finalizer → cleanup on delete → ensure owned resources → update status"
            - type: interview
              label: Finalizer Reconciler
              text: Writing a complete reconciler with finalizers is a senior K8s/Go interview question
            - type: gotcha
              label: Status Subresource
              text: >-
                With a real CRD you update status separately via Status().Update() — regular Update() ignores status
                changes. The example.com/rendered annotation stands in for status here.
