            - title: Hint
              content: >-
                <code>if err == nil { t.Fatal("expected error, got nil") }</code> for negative cases. <code>if err != nil
                { t.Errorf("unexpected error: %v", err) }</code> for positive cases.
          solution: |-
            func TestValidatePort_Valid(t *testing.T) {
                if err := ValidatePort(8080); err != nil {
                    t.Errorf("ValidatePort(8080) returned error: %v", err)
                }
            }

            func TestValidatePort_Zero(t *testing.T) {
                err := ValidatePort(0)
                if err == nil {
                    t.Fatal("ValidatePort(0) should error, got nil")
                }
                if !strings.Contains(err.Error(), "port") {
                    t.Errorf("error %q should mention 'port'", err.Error())
                }
            }

            func TestValidatePort_TooHigh(t *testing.T) {
                if err := ValidatePort(70000); err == nil {
                    t.Fatal("ValidatePort(70000) should error, got nil")
                }
            }
          annotations:
            - type: idiom
              label: 'Test name = Test<Func>_<Case>'
              text: >-
                The convention. Makes <code>go test -run TestValidatePort_Zero</code> select exactly the test you want.
            - type: pattern
              label: Fatal vs Error
              text: Fatal stops this test. Error continues. Use Fatal when continuing is unsafe (nil deref looms).
        - id: v2
          title: Test a Function That Returns a Map
          description: >-
            Given <code>func CountStatuses(pods []Pod) map[string]int</code>, write
            <code>TestCountStatuses</code> that builds a sample slice of Pods, calls the function, and checks that each
            expected status has the right count. Map iteration is random — assert by key lookup, not by iterating the map.
          functionSignature: TestCountStatuses(t *testing.T)
          difficulty: 2
          implGo: |-
            type Pod struct {
                Name   string
                Status string
            }

            func CountStatuses(pods []Pod) map[string]int {
                counts := map[string]int{}
                for _, p := range pods {
                    counts[p.Status]++
                }
                return counts
            }
