          implGo: |-
            type Pod struct {
                Name string
            }

            var (
                ErrNotFound      = errors.New("not found")
                ErrAlreadyExists = errors.New("already exists")
            )

            type PodStore struct {
                pods map[string]Pod
            }

            func NewPodStore() *PodStore {
                return &PodStore{pods: map[string]Pod{}}
            }

            func (s *PodStore) Get(name string) (Pod, error) {
                pod, ok := s.pods[name]
                if !ok {
                    return Pod{}, fmt.Errorf("pod %q: %w", name, ErrNotFound)
                }
                return pod, nil
            }

            func (s *PodStore) Add(pod Pod) error {
                if _, ok := s.pods[pod.Name]; ok {
                    return fmt.Errorf("pod %q: %w", pod.Name, ErrAlreadyExists)
                }
                s.pods[pod.Name] = pod
                return nil
            }

            func (s *PodStore) Delete(name string) error {
                if _, ok := s.pods[name]; !ok {
                    return fmt.Errorf("pod %q: %w", name, ErrNotFound)
                }
                delete(s.pods, name)
                return nil
            }

            func (s *PodStore) Count() int {
                return len(s.pods)
            }
