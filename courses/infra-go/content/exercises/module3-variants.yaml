        - id: v2
          title: Test a Metric Parser
          description: >-
            Write comprehensive table-driven tests for <code>parseMetricLine(line string) (Metric, error)</code> which
            parses Prometheus-style lines like <code>http_requests_total{method="GET"} 42</code>. Test: valid line with
            labels, valid line without labels, missing value, invalid value (not a number), malformed labels, and empty
            line.
          functionSignature: func TestParseMetricLine(t *testing.T)
          difficulty: 2
          implGo: |-
            type Metric struct {
                Name   string
                Value  int
                Labels map[string]string
            }

            func parseMetricLine(line string) (Metric, error) {
                line = strings.TrimSpace(line)
                if line == "" {
                    return Metric{}, errors.New("empty line")
                }
                name := line
                rest := ""
                labels := map[string]string{}
                if open := strings.Index(line, "{"); open >= 0 {
                    end := strings.Index(line, "}")
                    if end < open {
                        return Metric{}, fmt.Errorf("malformed labels in %q", line)
                    }
                    name = line[:open]
                    for _, pair := range strings.Split(line[open+1:end], ",") {
                        if pair == "" {
                            continue
                        }
                        k, v, ok := strings.Cut(pair, "=")
                        if !ok {
                            return Metric{}, fmt.Errorf("malformed label %q", pair)
                        }
                        labels[k] = strings.Trim(v, "\"")
                    }
                    rest = line[end+1:]
                } else if sp := strings.IndexByte(line, ' '); sp >= 0 {
                    name = line[:sp]
                    rest = line[sp+1:]
                } else {
                    return Metric{}, fmt.Errorf("missing value in %q", line)
                }
                value, err := strconv.Atoi(strings.TrimSpace(rest))
                if err != nil {
                    return Metric{}, fmt.Errorf("invalid value in %q: %v", line, err)
                }
                return Metric{Name: name, Value: value, Labels: labels}, nil
            }
