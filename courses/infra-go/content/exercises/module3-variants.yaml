          title: Test a Config Linter
          description: >-
            Write table-driven tests for <code>lintConfig(entries []ConfigEntry) []LintError</code>. Each LintError has
            Key and Message. Test: all valid entries (no errors), duplicate keys, empty values, and keys with invalid
            characters. Verify both the count and content of returned errors.
          functionSignature: func TestLintConfig(t *testing.T)
          difficulty: 1
          implGo: |-
            type ConfigEntry struct {
                Key   string
                Value string
            }

            type LintError struct {
                Key     string
                Message string
            }

            func validKey(key string) bool {
                if key == "" {
                    return false
                }
                for _, r := range key {
                    ok := r == '_' || r == '-' || r == '.' ||
                        (r >= 'a' && r <= 'z') || (r >= 'A' && r <= 'Z') || (r >= '0' && r <= '9')
                    if !ok {
                        return false
                    }
                }
                return true
            }

            func lintConfig(entries []ConfigEntry) []LintError {
                var errs []LintError
                seen := map[string]bool{}
                for _, e := range entries {
                    if !validKey(e.Key) {
                        errs = append(errs, LintError{Key: e.Key, Message: "invalid characters in key"})
                    }
                    if seen[e.Key] {
                        errs = append(errs, LintError{Key: e.Key, Message: "duplicate key"})
                    }
                    seen[e.Key] = true
                    if e.Value == "" {
                        errs = append(errs, LintError{Key: e.Key, Message: "empty value"})
                    }
                }
                return errs
            }
