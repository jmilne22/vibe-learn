                type Pod struct {
                    Name   string
                    Status string
                }

                func CountStatuses(pods []Pod) map[string]int {
                    counts := map[string]int{}
                    for _, p := range pods {
                        if p.Status == "Running" {
                            counts[p.Status]++
                        }
                    }
                    return counts
                }
          testCases:
            - input: go test -run TestCountStatuses
              output: PASS
          hints:
            - title: Think about it
              content: >-
                Don't loop the map and compare to a slice — iteration order is random. Look up each expected key directly
                in <code>got</code>.
            - title: Hint
              content: >-
                <code>if got["Running"] != 3 { t.Errorf(...) }</code>. Or use <code>reflect.DeepEqual</code> to compare
                two maps wholesale.
          solution: |-
            func TestCountStatuses(t *testing.T) {
                pods := []Pod{
                    {Status: "Running"}, {Status: "Running"}, {Status: "Running"},
                    {Status: "Pending"},
                    {Status: "Failed"}, {Status: "Failed"},
                }
                got := CountStatuses(pods)
                want := map[string]int{"Running": 3, "Pending": 1, "Failed": 2}
                if !reflect.DeepEqual(got, want) {
                    t.Errorf("CountStatuses() = %v, want %v", got, want)
                }
            }
          annotations:
            - type: gotcha
              label: Map iteration is random
              text: >-
                Never compare maps by iterating them. Use <code>reflect.DeepEqual</code> or look up each expected key.
            - type: stdlib
              label: reflect.DeepEqual
              text: >-
                Works for maps, slices, structs, pointers — anything. Slow, but fine for tests.
