                Phase 4: Delete one, verify ErrNotFound on re-get. Phase 5: <code>store.Count() == 4</code>.
          solution: |-
            func TestPodStoreIntegration(t *testing.T) {
                store := NewPodStore()
                pods := []string{"web-1", "web-2", "api-1", "db-1", "cache-1"}

                t.Run("add pods", func(t *testing.T) {
                    for _, name := range pods {
                        err := store.Add(Pod{Name: name})
                        if err != nil {
                            t.Fatalf("adding %s: %v", name, err)
                        }
                    }
                })

                t.Run("verify count", func(t *testing.T) {
                    if got := store.Count(); got != 5 {
                        t.Errorf("count = %d, want 5", got)
                    }
                })

                t.Run("get each pod", func(t *testing.T) {
                    for _, name := range pods {
                        pod, err := store.Get(name)
                        if err != nil {
                            t.Errorf("getting %s: %v", name, err)
                            continue
                        }
                        if pod.Name != name {
                            t.Errorf("got name %q, want %q", pod.Name, name)
                        }
                    }
                })

                t.Run("delete and verify", func(t *testing.T) {
                    err := store.Delete("web-2")
                    if err != nil {
                        t.Fatalf("deleting web-2: %v", err)
                    }
                    _, err = store.Get("web-2")
                    if !errors.Is(err, ErrNotFound) {
                        t.Errorf("expected ErrNotFound after delete, got %v", err)
                    }
                })

                t.Run("final count", func(t *testing.T) {
                    if got := store.Count(); got != 4 {
                        t.Errorf("count = %d, want 4", got)
                    }
                })
            }
          annotations:
            - type: pattern
              label: Phase-based testing
              text: >-
                Subtests as phases make failures obvious: 'TestPodStoreIntegration/delete_and_verify FAIL'. You know
                exactly which phase broke.
            - type: idiom
              label: t.Fatalf vs t.Errorf
              text: >-
                Fatal in setup phases (if add fails, nothing else matters). Error in verification phases (collect all
                failures).
            - type: interview
              label: Testing strategy
              text: >-
                Integration tests prove the system works end-to-end. Combine with unit tests (table-driven) for thorough
                coverage.
    - id: challenge_5
      block: 2
      difficulty: 2
      concept: Wrapping
      variants:
        - id: v1
          title: Layered Config Loader
          description: >-
            Write <code>loadConfig(path string) (Config, error)</code> that reads a file and parses YAML. At each layer —
            file read, YAML parse — wrap the error with context using <code>%w</code>. Then write a caller that uses
            <code>errors.Is</code> to detect <code>os.ErrNotExist</code> through the wrapping and falls back to a default
            config.
          functionSignature: func loadConfig(path string) (Config, error)
          difficulty: 2
          testCases:
            - input: loadConfig("/exists/valid.yaml")
              output: (Config{...}, nil)
            - input: loadConfig("/missing.yaml")
              output: '(Config{}, "loading config /missing.yaml: ... no such file or directory")'
          hints:
            - title: Think about it
              content: >-
                Two layers of wrapping. The caller wants to handle <code>os.ErrNotExist</code> specifically — so wrapping
                must use <code>%w</code>, not <code>%v</code>.
            - title: Hint
              content: >-
                <code>fmt.Errorf("loading config %s: %w", path, err)</code>. Then in the caller,
                <code>errors.Is(err, os.ErrNotExist)</code> sees through both wraps.
          solution: |-
            type Config struct {
                Name string `yaml:"name"`
                Port int    `yaml:"port"`
            }

            func loadConfig(path string) (Config, error) {
                data, err := os.ReadFile(path)
                if err != nil {
                    return Config{}, fmt.Errorf("loading config %s: %w", path, err)
                }
                var cfg Config
                if err := yaml.Unmarshal(data, &cfg); err != nil {
                    return Config{}, fmt.Errorf("parsing config %s: %w", path, err)
                }
                return cfg, nil
            }

            func loadConfigOrDefault(path string) Config {
                cfg, err := loadConfig(path)
                if err == nil {
                    return cfg
                }
                if errors.Is(err, os.ErrNotExist) {
                    return Config{Name: "default", Port: 8080}
                }
                log.Fatalf("config error: %v", err)
                return Config{}
            }
          annotations:
            - type: idiom
              label: '%w preserves identity'
              text: >-
                Use <code>%w</code> when callers might want to inspect the error. Use <code>%v</code> only when the
                wrapped error is opaque to callers.
            - type: gotcha
              label: One %w per Errorf
              text: >-
                <code>fmt.Errorf</code> only allows a single <code>%w</code> verb. For multiple wrapping, nest calls.
        - id: v2
          title: Typed Error Inspection
          description: >-
            Define a custom error type <code>RetryableError</code> with a <code>RetryAfter time.Duration</code> field.
            Write <code>callAPI(url string) (string, error)</code> that wraps a transient failure (a connection error
            or a 503 response) as a <code>*RetryableError</code> with a short retry delay. Then write
            <code>callWithRetry(url string)</code> that uses <code>errors.As</code> to detect the retryable error,
            sleeps the requested duration, and retries up to 3 times.
          functionSignature: func callWithRetry(url string) (string, error)
          difficulty: 3
          testCases:
            - input: 'var calls int32; srv := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) { if atomic.AddInt32(&calls, 1) <= 2 { w.WriteHeader(503); return }; fmt.Fprint(w, "ok") })); callWithRetry(srv.URL)'
              output: '("ok", nil) — the flaky server succeeds on the third attempt'
            - input: 'srv := httptest.NewServer(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) { w.WriteHeader(503) })); _, err := callWithRetry(srv.URL); err'
              output: 'giving up after 3 attempts: calling API: transient: server returned 503 (retry in 10ms)'
          hints:
            - title: Think about it
              content: >-
                <code>errors.As</code> walks the chain looking for an error assignable to your target. So
                <code>callAPI</code> can <code>%w</code>-wrap the <code>RetryableError</code> and the caller still
                extracts it.
            - title: Hint
              content: >-
                <code>var re *RetryableError; if errors.As(err, &amp;re) { time.Sleep(re.RetryAfter); continue }</code>.
                Pointer receiver on <code>Error()</code> means you need <code>*RetryableError</code> in
                <code>errors.As</code>.
          solution: |-
            type RetryableError struct {
                Underlying error
                RetryAfter  time.Duration
            }

            func (e *RetryableError) Error() string {
                return fmt.Sprintf("transient: %v (retry in %s)", e.Underlying, e.RetryAfter)
            }

            func (e *RetryableError) Unwrap() error { return e.Underlying }

            func callAPI(url string) (string, error) {
                resp, err := http.Get(url)
                if err != nil {
                    return "", fmt.Errorf("calling API: %w", &RetryableError{
                        Underlying: errors.New("connection failed"),
                        RetryAfter: 10 * time.Millisecond,
                    })
                }
                defer resp.Body.Close()
                if resp.StatusCode == http.StatusServiceUnavailable {
                    return "", fmt.Errorf("calling API: %w", &RetryableError{
                        Underlying: fmt.Errorf("server returned %d", resp.StatusCode),
                        RetryAfter: 10 * time.Millisecond,
                    })
                }
                body, _ := io.ReadAll(resp.Body)
                return string(body), nil
            }

            func callWithRetry(url string) (string, error) {
                var lastErr error
                for attempt := 1; attempt <= 3; attempt++ {
                    body, err := callAPI(url)
                    if err == nil {
                        return body, nil
                    }
                    lastErr = err
                    var re *RetryableError
                    if errors.As(err, &re) {
                        time.Sleep(re.RetryAfter)
                        continue
                    }
                    return "", fmt.Errorf("non-retryable: %w", err)
                }
                return "", fmt.Errorf("giving up after 3 attempts: %w", lastErr)
            }
          annotations:
            - type: pattern
              label: Implement Unwrap
              text: >-
                Custom error types should implement <code>Unwrap() error</code> if they wrap another error. That's how
                <code>errors.Is</code> walks past your type.
            - type: gotcha
              label: Pointer vs value receiver
              text: >-
                If <code>Error()</code> has a pointer receiver, <code>errors.As</code> needs a <code>**T</code> target.
                Pick one and stick with it.
    - id: challenge_6
      block: 2
      difficulty: 1
      concept: Writing Tests
      variants:
        - id: v1
