course:
  name: "Infrastructure Development with Go"
  shortName: "Infrastructure Go"
  slug: infra-go
  description: "From DevOps engineer to infrastructure developer. Build CLI tools, API clients, concurrent services, networking utilities, container internals, Kubernetes controllers, and algorithm practice."
  storagePrefix: infra-go

tracks:
  - title: Fundamentals Through Infra
    modules: [0, 1, 2, 3]
  - title: CLI & API Tools
    modules: [4, 5]
  - title: Concurrency
    modules: [6, 7]
  - title: Networking & Infrastructure
    modules: [8, 9, 10, 11]
  - title: "Optional: Interview Prep & Open Source"
    modules: [12, 13]

modules:
  - title: Reference & Setup
    description: "Go toolchain, project layout, editor setup, and quick reference. Your cheat sheet for the course."
    hasExercises: false

  - title: Data Manipulation Bootcamp
    description: "Slice logs, parse metric labels, count 5xx responses, deduplicate IPs, and practice the data-manipulation loops used in operational tools."

  - title: Pointers, Structs & Interfaces
    description: "Pointers and nil, model real infrastructure with structs, compose with embedding, and design small interfaces the Go way."

  - title: Errors, Testing & Confidence
    description: "Error wrapping, sentinel errors, table-driven tests. You test everything from here on."

  - title: CLI Design & Config Parsing
    description: "Build real CLI tools with Cobra. Parse YAML, JSON, and TOML configs. Validate and lint."

  - title: HTTP Clients & API Integration
    description: "Talk to APIs, handle auth, paginate results. Build tools that query cloud providers."

  - title: Goroutines & Channels
    description: "Launch concurrent work, collect results, and coordinate goroutines with WaitGroups."

  - title: Concurrency Patterns
    description: "Fan-out/fan-in, worker pools, rate limiting, select. Context, cancellation, graceful shutdown."

  - title: HTTP Servers & Middleware
    description: "Build APIs, not just consume them. Routing, middleware chains, health endpoints, structured logging."

  - title: Networking & Protocols
    description: "TCP/UDP from scratch, DNS wire format, gRPC and protobuf. Understand the network layer."

  - title: Container Internals
    description: "Namespaces, cgroups, pivot_root, and process isolation from Go."

  - title: Kubernetes from Go
    description: "client-go, informers, reconciliation loops. Build an operator that watches custom resources."

  - title: Algorithm Patterns
    description: "Hash maps, two pointers, sliding window, binary search, stacks. Infra-themed problems, interview-ready patterns."

  - title: Reading & Contributing to Open Source
    description: "Navigate K8s, Terraform, Prometheus codebases. Find good-first-issues. Make a real contribution."
    hasExercises: false

projects:
  - id: p1
    num: P1
    title: Config Linter
    file: project-config-linter
    afterModule: 4
    description: "Build a CLI that reads K8s YAML, validates against rules, and reports violations. Built via the Build sections closing Modules 1-4; this page is the full spec and ship point."
    verification:
      rubric:
        - "All six rules have table-driven tests with valid, invalid, and malformed fixtures."
        - "Exit codes distinguish clean input, violations, and operational failure."
        - "Wrapped errors retain filenames and underlying causes for errors.Is/errors.As."
        - "The README demonstrates installation, usage, output, and test commands."
      delayedTickets:
        - "Add a seventh rule requested by a user without changing the existing rule loop."
        - "Diagnose why a multi-document YAML file silently skips its second document, then add a regression test."

  - id: p2
    num: P2
    title: Cloud Resource Reporter
    file: project-cloud-reporter
    afterModule: 5
    description: "Query cloud APIs, aggregate resource data, output formatted reports. Built via the Build sections closing Modules 5-7; this page is the full spec and ship point."
    verification:
      rubric:
        - "HTTP behavior is tested with httptest rather than a live third-party API."
        - "Cancellation, pagination, non-2xx responses, and malformed JSON have tests."
        - "Concurrency is bounded and passes the race detector."
        - "Output is deterministic despite concurrent fetching."
      delayedTickets:
        - "Add retry-after handling for 429 responses without duplicating completed pages."
        - "Investigate and fix a goroutine leak when one page returns malformed JSON."

  - id: p3
    num: P3
    title: DNS Server
    file: project-dns-server
    afterModule: 9
    description: "Build a DNS server from scratch. Parse binary DNS packets, resolve queries, handle concurrent requests. Built via the Build sections closing Modules 8-9; this page is the full spec and ship point."
    verification:
      rubric:
        - "Packet parsing rejects truncated labels, invalid offsets, and compression loops safely."
        - "A, AAAA, CNAME, MX, and TXT responses have fixture-based tests."
        - "The server handles concurrent UDP requests without races."
        - "UDP truncation and TCP fallback behavior are documented and tested."
      delayedTickets:
        - "Add a cache with TTL expiry and prove expired records are not served."
        - "Debug a packet whose compression pointer creates a cycle without hanging the server."

  - id: p4
    num: P4
    title: Mini Container Runtime
    file: project-container-runtime
    afterModule: 10
    description: "Build a minimal container runtime using Linux namespaces and cgroups. Run isolated processes with resource limits. Applies Module 10."
    verification:
      rubric:
        - "Pure path, mount-plan, and cgroup configuration logic has unprivileged unit tests."
        - "Privileged integration checks are isolated to a disposable Linux VM."
        - "Cleanup runs on success, error, signal, and child-process failure."
        - "Safety limitations are explicit in the README."
      delayedTickets:
        - "Inject a child-process failure and prove mounts and cgroup directories are still removed."
        - "Add a pids.max option without widening the privileged code path."

  - id: p5
    num: P5
    title: K8s Operator
    file: project-k8s-operator
    afterModule: 11
    description: "Build a Kubernetes operator that watches a custom resource and reconciles desired state. Applies Module 11."
    verification:
      rubric:
        - "Reconciliation is idempotent and tested with the fake client."
        - "Owned resources, status updates, retries, and deletion paths have tests."
        - "Transient errors requeue safely without hot-looping."
        - "The controller requires no live cluster for its unit test suite."
      delayedTickets:
        - "Handle manual deletion of a child Deployment and prove the next reconcile recreates it."
        - "Add a finalizer that cleans an external resource and remains safe across retries."

