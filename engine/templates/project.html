<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: {{TITLE}} | {{COURSE_NAME}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
{{THEME_LINKS}}
</head>
<body>
    <div class="scroll-progress" aria-hidden="true"></div>
    <main class="workbook-shell">
    <div class="container workbook-container">
        <nav class="workbook-top-nav" aria-label="Page navigation">
{{NAV_LINKS}}
        </nav>

        <header class="module-header lesson-header">
            <div class="module-tag">Project milestone</div>
            <h1>{{TITLE}}</h1>
            <p class="module-desc">{{MODULE_DESC}}</p>
        </header>

        <article class="lesson workbook-content">
{{LESSON_CONTENT}}
        </article>

{{NAV_BUTTONS}}
    </div>
    </main>

    <script src="course-data.js"></script>
    <script src="course-config.js"></script>
    <script src="icons.js"></script>
    <script src="theme.js"></script>
    <script src="timer.js"></script>
    <script src="sidebar.js"></script>
    <script src="copy-code.js"></script>
</body>
</html>
